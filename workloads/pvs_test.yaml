#!/usr/bin/env nbrs
# pvs_test.yaml — Predicated Vector Search test workload.
#
# Discovers all profiles in a vector dataset, emits metadata about
# each one, then iterates filtered ground-truth neighbors for a
# chosen query index against a specified profile.
#
# Usage:
#   nbrs pvs_test.yaml
#   nbrs pvs_test.yaml dataset=sift1m
#   nbrs pvs_test.yaml dataset=sift1m profile=label-1 qi=10
#   nbrs pvs_test.yaml profiles        # just show profiles
#   nbrs pvs_test.yaml filtered_neighbors  # just show GT

params:
  dataset: sift1m
  profile: default
  qi: "0"

bindings: |
  inputs := (cycle)

  # Dataset-level constants (from default profile)
  dim := vector_dim("{dataset}")
  base_count := vector_count("{dataset}")
  query_count := query_count("{dataset}")
  neighbor_k := neighbor_count("{dataset}")
  dist_fn := dataset_distance_function("{dataset}")
  facets := dataset_facets("{dataset}")

  # Profile enumeration
  profile_count := dataset_profile_count("{dataset}")
  profile_names := dataset_profile_names("{dataset}")

  # Per-cycle profile inspection (cycle = profile index)
  pname := dataset_profile_name_at(cycle, "{dataset}")
  pbase := profile_base_count(cycle, "{dataset}")
  pfacets := profile_facets(cycle, "{dataset}")

  # Profile-specific vector access: dataset:profile syntax
  profile_base_vec := vector_at(cycle, "{dataset}:{profile}")
  profile_base_count := vector_count("{dataset}:{profile}")

  # Filtered neighbors for the selected profile + query
  query_idx := {qi}
  fni := filtered_neighbor_indices_at(query_idx, "{dataset}:{profile}")
  fnd := filtered_neighbor_distances_at(query_idx, "{dataset}:{profile}")

scenarios:
  default:
    - summary
    - profiles
    - filtered_neighbors

phases:
  summary:
    cycles: 1
    concurrency: 1
    ops:
      header:
        stmt: "=== Predicated Vector Search: {dataset} ==="
      dimensions:
        stmt: "  dimensions:         {dim}"
      base_count:
        stmt: "  base vectors:       {base_count}"
      query_count:
        stmt: "  query vectors:      {query_count}"
      neighbor_k:
        stmt: "  neighbors (maxk):   {neighbor_k}"
      distance_fn:
        stmt: "  distance function:  {dist_fn}"
      facets:
        stmt: "  available facets:   {facets}"
      profile_summary:
        stmt: "  profiles ({profile_count}): {profile_names}"

  profiles:
    cycles: "{profile_count}"
    concurrency: 1
    ops:
      profile_detail:
        stmt: "  profile[{cycle}] name={pname}  base_count={pbase}  facets=[{pfacets}]"

  filtered_neighbors:
    cycles: 1
    concurrency: 1
    ops:
      fn_header:
        stmt: "--- Profile '{profile}': filtered neighbors for query[{qi}] ---"
      fn_indices:
        stmt: "  indices:   {fni}"
      fn_distances:
        stmt: "  distances: {fnd}"
      fn_base_count:
        stmt: "  profile base vectors: {profile_base_count}"
