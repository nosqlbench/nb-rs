# vector_inspect.yaml — Comprehensive dataset inspection.
#
# Discovers and displays all available information about a vector
# dataset, then iterates through the metadata indices for a single
# query to show each matching base ordinal.
#
# Usage:
#   nbrs vector_inspect.yaml
#   nbrs vector_inspect.yaml dataset=sift1m
#   nbrs vector_inspect.yaml dataset=sift1m qi=42

params:
  dataset: sift1m
  qi: "5"
  cycles: {mi_count}

bindings: |
  inputs := (cycle)

  dim := vector_dim("{dataset}")
  base_count := vector_count("{dataset}")
  query_count := query_count("{dataset}")
  neighbor_k := neighbor_count("{dataset}")
  dist_fn := dataset_distance_function("{dataset}")
  facets := dataset_facets("{dataset}")

  query_idx := {qi}
  mi_len := metadata_indices_len_at(query_idx, "{dataset}")
  mi := metadata_indices_at(query_idx, "{dataset}")
  mi_count := metadata_indices_count("{dataset}")
  base_ordinal := array_at(mi, cycle)

ops:
  mi_entry:
    stmt: "  query[{qi}] match[{cycle}] = base[{base_ordinal}]"
