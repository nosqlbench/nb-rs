<div class="grid grid-4">
    <div class="card stat"><div class="value" id="total-cycles">0</div><div class="label">Total Cycles</div></div>
    <div class="card stat"><div class="value" id="ops-per-sec">&mdash;</div><div class="label">Ops/sec</div></div>
    <div class="card stat"><div class="value" id="p99-latency">&mdash;</div><div class="label">P99 (ms)</div></div>
    <div class="card stat"><div class="value" id="error-count">0</div><div class="label">Errors</div></div>
</div>
<div class="card">
    <h2>Activities</h2>
    <div id="activities" hx-get="/api/activities" hx-trigger="every 2s">
        <p style="color: var(--text-dim)">No activities running. Use <code>nbrs run --web</code> to see live metrics.</p>
    </div>
</div>
