<div hx-ext="ws" ws-connect="/ws/metrics">
<div class="grid grid-4">
    <div class="card stat">
        <div class="value" id="total-cycles">{{ total_cycles }}</div>
        <div class="label">Total Cycles</div>
    </div>
    <div class="card stat">
        <div class="value" id="ops-per-sec">{{ ops_per_sec }}</div>
        <div class="label">Ops/sec</div>
    </div>
    <div class="card stat">
        <div class="value" id="p99-latency">{{ p99_ms }}</div>
        <div class="label">P99 (ms)</div>
    </div>
    <div class="card stat">
        <div class="value" id="error-count">{{ error_count }}</div>
        <div class="label">Errors</div>
    </div>
</div>

<div class="card">
    <h2>Op Rate</h2>
    <div id="rate-sparkline" style="overflow: hidden; height: 80px;">
        <p style="color: var(--text-dim);">Waiting for metrics...</p>
    </div>
</div>

<div class="card">
    <h2>Metrics Log</h2>
    <div style="max-height: 300px; overflow-y: auto;">
        <table>
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Ops/sec</th>
                    <th>P99 (ms)</th>
                    <th>Cycles</th>
                    <th>Errors</th>
                </tr>
            </thead>
            <tbody id="metrics-log">
            </tbody>
        </table>
    </div>
</div>
</div>

<div class="grid grid-2">
    <div class="card">
        <h2>Activities</h2>
        <div id="activities-table" hx-get="/api/activities" hx-trigger="every 2s">
            {% include "fragments/activities_table.html" %}
        </div>
    </div>
    <div class="card">
        <h2>Recent Ops</h2>
        <div id="recent-ops">
            <p style="color: var(--text-dim)">No activity running</p>
        </div>
    </div>
</div>
