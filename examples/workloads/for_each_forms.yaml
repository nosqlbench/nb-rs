#!/usr/bin/env nbrs
# Comprehensions — YAML sugar and the canonical GK form, side by side.
#
# All iteration shapes (single-clause `for_each`, multi-clause
# `for_combinations`, `for_each_union`) collapse into a single
# canonical model in `nbrs_variates::comprehension::Comprehension`:
#
#     "<var> in <expr> [, <var> in <expr>]* [where <predicate>]"
#
# That string is the GK-native form. YAML keys (`for_each`, `for`,
# `for_combinations`, `where`, multi-line array form) are sugar
# that eventually compiles to the same `Comprehension` AST.
#
# Each scenario below shows:
#   - The YAML form the user wrote
#   - The equivalent GK comprehension text (what
#     `nbrs_variates::comprehension::parse_comprehension_text`
#     accepts)
#   - The iteration shape it produces
#
# Run any scenario:
#   nbrs run for_each_forms.yaml scenario=<name>

scenarios:

  # ===============================================================
  # FORM 1 — Single variable
  # ===============================================================
  #   YAML:    for_each: "x in 1,2,3"
  #   GK text: "x in 1,2,3"
  #   Mode:    Cartesian (1 clause)
  #   Tuples:  (x=1), (x=2), (x=3)
  form1_single_var:
    - for_each: "x in 1,2,3"
      phases: [q1]

  # ===============================================================
  # FORM 1b — Same as Form 1 with the shorter `for` keyword
  # ===============================================================
  # `for` is an accepted synonym for `for_each` in YAML; both
  # parse to the same Comprehension. The GK text is identical.
  form1b_for_keyword:
    - for: "x in 1,2,3"
      phases: [q1]

  # ===============================================================
  # FORM 2 — Inline multi-clause Cartesian
  # ===============================================================
  #   YAML:    for_each: "x in 1,2,3, y in a,b"
  #   GK text: "x in 1,2,3, y in a,b"
  #   Mode:    Cartesian (2 distinct clauses)
  #   Tuples:  cross product — 6 total:
  #              (x=1,y=a) (x=1,y=b)
  #              (x=2,y=a) (x=2,y=b)
  #              (x=3,y=a) (x=3,y=b)
  form2_inline_cartesian:
    - for_each: "x in 1,2,3, y in a,b"
      phases: [q2]

  # ===============================================================
  # FORM 3 — Array form Cartesian (one clause per entry)
  # ===============================================================
  #   YAML:    for_each: ["x in 1,2,3", "y in a,b"]
  #   GK text: "x in 1,2,3, y in a,b"   (collapses to inline form;
  #                                      distinct names ⇒ Cartesian)
  #   Mode:    Cartesian (same as form 2)
  #   Tuples:  6 total
  form3_array_cartesian:
    - for_each:
      - "x in 1,2,3"
      - "y in a,b"
      phases: [q2]

  # ===============================================================
  # FORM 4 — Single array entry with multiple clauses
  # ===============================================================
  #   YAML:    for_each: ["x in 1,2,3, y in a,b"]
  #   GK text: "x in 1,2,3, y in a,b"   (single sub-space)
  #   Mode:    Cartesian (same as form 2)
  #   Tuples:  6 total
  form4_array_single_multi:
    - for_each:
      - "x in 1,2,3, y in a,b"
      phases: [q2]

  # ===============================================================
  # FORM 5 — Union of single-clause sub-spaces (repeated var)
  # ===============================================================
  #   YAML:    for_each: ["x in 1", "x in 2", "x in 3"]
  #   GK text: "x in 1, x in 2, x in 3"  (repeated var ⇒ Union)
  #   Mode:    Union (3 sub-spaces, each a single (x) tuple)
  #   Tuples:  3 total — (x=1), (x=2), (x=3)
  #            Same emitted shape as Form 1, but explicit about
  #            each value coming from its own sub-space (handy
  #            when each value comes from a different source).
  form5_repeated_var_union:
    - for_each:
      - "x in 1"
      - "x in 2"
      - "x in 3"
      phases: [q1]

  # ===============================================================
  # FORM 6 — Union of multi-clause sub-spaces
  # ===============================================================
  #   YAML:    for_each: ["x in 10, y in a,b,c", "x in 100, y in d,e,f"]
  #   GK text: "x in 10, y in a,b,c, x in 100, y in d,e,f"
  #            (repeated var ⇒ Union; sub-space boundaries preserved)
  #   Mode:    Union (2 sub-spaces, each a 2-clause Cartesian)
  #   Tuples:  6 total —
  #              sub-space 1: (x=10, y=a), (x=10, y=b), (x=10, y=c)
  #              sub-space 2: (x=100, y=d), (x=100, y=e), (x=100, y=f)
  #            The Cartesian product would have visited the invalid
  #            corners (e.g. x=10, y=d). Union skips those by
  #            construction — the original use case.
  form6_array_subspace_union:
    - for_each:
      - "x in 10,  y in a,b,c"
      - "x in 100, y in d,e,f"
      phases: [q2]

  # ===============================================================
  # FORM 7 — Cartesian with `where` filter predicate
  # ===============================================================
  #   YAML:    for_each: "k in 10,100, limit in 1,10,50,100"
  #            where: "{k} * {limit} < 1000"
  #   GK text: "k in 10,100, limit in 1,10,50,100 where {k} * {limit} < 1000"
  #   Mode:    Cartesian, with filter
  #   Tuples:  Cross product is 8 tuples; the predicate keeps only
  #            those where k*limit < 1000:
  #              kept:    (k=10,  limit=1)   (k=10,  limit=10)
  #                       (k=10,  limit=50)
  #                       (k=100, limit=1)
  #              skipped: (k=10,  limit=100)   k*limit = 1000
  #                       (k=100, limit=10)    k*limit = 1000
  #                       (k=100, limit=50)    k*limit = 5000
  #                       (k=100, limit=100)   k*limit = 10000
  #
  # The filter uses the same `{name}` interpolation syntax as the
  # rest of the workload — clause-bound names (`{k}`, `{limit}`)
  # resolve to the current tuple's values, the result is run
  # through GK's const-expr evaluator, and tuples whose predicate
  # is false are skipped.
  form7_cartesian_with_filter:
    - for: "k in 10,100, limit in 1,10,50,100"
      where: "{k} * {limit} < 1000"
      phases: [q_kl]

  # ===============================================================
  # FORM 8 — Union with `where` filter predicate
  # ===============================================================
  #   YAML:    for_each: ["k in 1,2,3", "k in 10,20,30"]
  #            where: "{k} > 2"
  #   GK text: "k in 1,2,3, k in 10,20,30 where {k} > 2"
  #   Mode:    Union, with filter applied per emitted tuple
  #   Tuples:  Union emits 6; filter keeps `{k} > 2`:
  #              sub-space 1: (k=3)
  #              sub-space 2: (k=10), (k=20), (k=30)
  #   The filter composes with both modes uniformly.
  form8_union_with_filter:
    - for_each:
      - "k in 1,2,3"
      - "k in 10,20,30"
      where: "{k} > 2"
      phases: [q1_k]

# Trivial phases that just print bound variables so the iteration
# shape is visible on stdout. `q1` for single-var scenarios
# (forms 1, 1b, 5), `q2` for two-var scenarios (forms 2-4, 6),
# `q_kl` for the (k, limit) filter scenario, `q1_k` for the
# k-only filter scenario.
phases:
  q1:
    adapter: stdout
    cycles: 1
    concurrency: 1
    bindings: |
      c := (cycle)
    ops:
      info:
        stmt: "x={x}"

  q2:
    adapter: stdout
    cycles: 1
    concurrency: 1
    bindings: |
      c := (cycle)
    ops:
      info:
        stmt: "x={x} y={y}"

  q1_k:
    adapter: stdout
    cycles: 1
    concurrency: 1
    bindings: |
      c := (cycle)
    ops:
      info:
        stmt: "k={k}"

  q_kl:
    adapter: stdout
    cycles: 1
    concurrency: 1
    bindings: |
      c := (cycle)
    ops:
      info:
        stmt: "k={k} limit={limit}"
