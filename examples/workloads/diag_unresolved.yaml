#!/usr/bin/env nbrs
# diag_unresolved.yaml — minimal repro for an unresolved-placeholder
# error inside a for_each spec. Used to verify that runtime errors
# carry a `<path>:<line>:<col>:` prefix so the user can jump to
# the source.
#
# `{undeclared_thing}` is referenced in the for_each spec but is
# neither a workload param, an outer iter var, nor an inherited
# binding — interpolation surfaces "unresolved placeholder".

scenarios:
  default:
    - for_each: "color in {undeclared_thing}"
      phases:
        - show

phases:
  show:
    cycles: 1
    concurrency: 1
    ops:
      line:
        stmt: "iteration"
