# basic_workload.yaml — A simple workload using compatibility-mode bindings
#
# This uses the legacy nosqlbench semicolon-chain binding syntax
# (Hash(); Mod(1000000)) which is automatically translated to GK
# nodes. For the native GK syntax, see gk_bindings.yaml.
#
# Usage:
#   nbrs run workload=examples/workloads/getting_started/basic_workload.yaml cycles=10

description: |
  A basic workload with schema setup and main read/write operations.

bindings:
  user_id: Hash(); Mod(1000000)
  seq: Identity()

blocks:
  schema:
    ops:
      create_table:
        stmt: "CREATE TABLE IF NOT EXISTS users (id int PRIMARY KEY, name text);"
  main:
    ops:
      write:
        ratio: 3
        stmt: "INSERT INTO users (id, name) VALUES ({user_id}, 'user_{seq}');"
      read:
        ratio: 1
        stmt: "SELECT * FROM users WHERE id={user_id};"
