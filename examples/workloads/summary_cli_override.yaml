#!/usr/bin/env nbrs
# Summary Report — CLI Override Examples
#
# The workload-level `summary:` sets the default report format, but
# the CLI `summary=` parameter overrides it entirely. This workload
# has a minimal default summary and is designed to be driven from
# the command line with different summary expressions.
#
# Try these:
#
#   # Default: show all columns
#   nbrs run workload=examples/summary_cli_override.yaml
#
#   # Only recall columns
#   nbrs run workload=examples/summary_cli_override.yaml summary=recall
#
#   # Recall with mean aggregate across all regions
#   nbrs run workload=examples/summary_cli_override.yaml \
#     summary="recall; mean(recall) over region~us"
#
#   # Only aggregates, no detail rows
#   nbrs run workload=examples/summary_cli_override.yaml \
#     summary="recall; mean(recall) over region~us; mean(recall) over region~eu; details=hide"
#
#   # Row filter: only show us-east rows
#   nbrs run workload=examples/summary_cli_override.yaml \
#     summary="all; filter=us-east"
#
#   # Min and max across all regions
#   nbrs run workload=examples/summary_cli_override.yaml \
#     summary="recall; min(recall) over region~us; max(recall) over region~us"
#
#   # No summary at all (remove the workload default)
#   nbrs run workload=examples/summary_cli_override.yaml summary=""

params:
  adapter: stdout
  regions: "us-east,us-west,eu-central,eu-west"
  query_count: "300"

# Default: show everything
summary: "all"

bindings: |
  inputs := (cycle)

scenarios:
  default:
    - for_each: "region in {regions}"
      phases:
        - query_region

phases:
  query_region:
    summary: true
    cycles: "{query_count}"
    concurrency: 1
    bindings: |
      inputs := (cycle)
      query_id := zero_pad_u64(mod(hash(cycle), 1000), 6)
      latency := format_f64(to_f64(mod(hash(hash(cycle)), 500)) / 10.0, 1)
      status := number_to_words(mod(hash(hash(hash(cycle))), 3))
    ops:
      req:
        stmt: "GET region={region} query={query_id} latency={latency}ms status={status}"
