#!/usr/bin/env nbrs
# capture_flow.yaml — Demonstrates capture flow between ops
#
# Shows how values flow between operations within a stanza:
# 1. A "read" op captures a value from its result
# 2. A downstream "write" op uses the captured value
# 3. default_or provides a fallback when captures aren't set yet
#
# Since the stdout adapter doesn't produce real captures, this
# example uses GK bindings to simulate the capture flow pattern.
# With a real database adapter, [username] syntax in the SELECT
# would extract the value from the result and feed it downstream.
#
# Usage:
#   ./examples/workloads/capture_flow.yaml cycles=10

params:
  user_count: "1000"

bindings: |
  inputs := (cycle)

  // Simulated "captured" value — in a real workload, this would
  // come from a SELECT result via [username] capture syntax.
  // Here we derive it from the cycle to demonstrate the pattern.
  simulated_capture := number_to_words(mod(hash(cycle), 100))

  // default_or: if the capture hasn't been set, use "anonymous".
  // With a real capture input (extern username: String), this
  // would return "anonymous" until the first SELECT populates it.
  greeting := default_or(simulated_capture, "anonymous")

  // Derived computation from the captured value
  user_id := mod(hash(cycle), {user_count})

ops:
  read_user:
    ratio: 1
    stmt: "SELECT [username] FROM users WHERE id={user_id}"

  greet_user:
    ratio: 1
    stmt: "UPDATE users SET greeting='Hello, {greeting}!' WHERE id={user_id}"
