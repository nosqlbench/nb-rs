#!/usr/bin/env nbrs
# Summary Sidecar File Demo
#
# This workload has NO summary: field. Instead, the summary config
# is loaded from `summary.yaml` in the same directory — a sidecar
# file that applies to any workload in this directory that doesn't
# define its own summary.
#
# Precedence (highest wins):
#   1. CLI `summary=...` parameter
#   2. Workload-level `summary:` field
#   3. Sidecar `summary.yaml` in the workload's directory
#
# To test:
#   # Uses summary.yaml sidecar
#   nbrs run workload=examples/summary_sidecar_demo.yaml
#
#   # CLI override beats the sidecar
#   nbrs run workload=examples/summary_sidecar_demo.yaml summary="all"
#
#   # No summary (empty override)
#   nbrs run workload=examples/summary_sidecar_demo.yaml summary=""

params:
  adapter: stdout
  regions: "us-east,us-west,eu-central"
  request_count: "200"

# NOTE: No summary: field here — see summary.yaml in this directory.

bindings: |
  inputs := (cycle)

scenarios:
  default:
    - for_each: "region in {regions}"
      phases:
        - handle_requests

phases:
  handle_requests:
    summary: true
    cycles: "{request_count}"
    concurrency: 1
    bindings: |
      inputs := (cycle)
      req_id := zero_pad_u64(mod(hash(cycle), 10000), 6)
      endpoint := number_to_words(mod(hash(hash(cycle)), 5))
    ops:
      req:
        stmt: "region={region} req={req_id} endpoint={endpoint}"
