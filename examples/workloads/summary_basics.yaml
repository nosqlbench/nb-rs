#!/usr/bin/env nbrs
# Summary Report Basics
#
# Demonstrates the summary report DSL: column selection, auto-scaled
# latency units, and the workload-level `summary:` master switch.
#
# The summary: property controls whether a report is printed and what
# it contains. No summary: means no report at all.
#
# Usage:
#   nbrs run workload=examples/summary_basics.yaml
#   nbrs run workload=examples/summary_basics.yaml scenario=all_columns
#   nbrs run workload=examples/summary_basics.yaml scenario=filtered_rows
#
# Override from CLI (takes precedence over workload summary:):
#   nbrs run workload=examples/summary_basics.yaml summary=all

params:
  adapter: stdout
  item_count: "500"
  batch_sizes: "10,50,100"

# Master switch: enables summary and selects recall columns only.
# Without this line, no summary table is printed.
summary: "recall"

bindings: |
  inputs := (cycle)
  item_id := zero_pad_u64(mod(hash(cycle), {item_count}), 6)
  score := to_f64(mod(hash(hash(cycle)), 100)) / 100.0

scenarios:
  # Default: run all phases, summary shows recall columns
  default:
    - setup
    - for_each: "batch in {batch_sizes}"
      phases:
        - process_batch

  # Show all columns (overrides the workload summary:)
  all_columns:
    - setup
    - for_each: "batch in {batch_sizes}"
      phases:
        - process_batch

  # Row filter: only show rows matching "batch=50"
  filtered_rows:
    - setup
    - for_each: "batch in {batch_sizes}"
      phases:
        - process_batch

phases:
  setup:
    cycles: 1
    concurrency: 1
    ops:
      info:
        stmt: "Initializing with {item_count} items"

  process_batch:
    summary: true
    cycles: "{item_count}"
    concurrency: 1
    bindings: |
      inputs := (cycle)
      item_id := zero_pad_u64(mod(hash(cycle), {item_count}), 6)
      score := format_f64(to_f64(mod(hash(hash(cycle)), 100)) / 100.0, 4)
    ops:
      process:
        stmt: "batch={batch} item={item_id} score={score}"
