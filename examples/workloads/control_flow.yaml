#!/usr/bin/env nbrs
# Control Flow Syntax Examples
#
# Demonstrates all control flow constructs available in scenario trees:
# - for_each at scenario level (wrapping phases)
# - for_each nested (for_each inside for_each)
# - for_each at phase level (lifted into scenario tree)
# - do_while at scenario level
# - do_until at scenario level
# - Mixed nesting (for_each containing do_until)
#
# All examples use adapter=stdout for safe testing without a database.
#
# Run specific scenarios:
#   nbrs run workload=control_flow.yaml scenario=test_for_each
#   nbrs run workload=control_flow.yaml scenario=test_nested
#   nbrs run workload=control_flow.yaml scenario=test_phase_for_each
#   nbrs run workload=control_flow.yaml scenario=test_do_until
#   nbrs run workload=control_flow.yaml scenario=test_do_while
#   nbrs run workload=control_flow.yaml scenario=test_mixed
#
# Default scenario runs the basic demonstrations:
#   nbrs run workload=control_flow.yaml

params:
  adapter: stdout
  colors: "red,green,blue"
  sizes: "small,large"
  animals: "cat,dog"

bindings: |
  greeting := "hello"

scenarios:
  # --- Scenario-level for_each ---
  # Iterates a comma-separated list. Each value is available as {color}.
  test_for_each:
    - for_each: "color in {colors}"
      phases:
        - show_color

  # --- Nested for_each ---
  # Outer loop iterates colors, inner loop iterates sizes.
  # Both {color} and {size} are available in the innermost phase.
  test_nested:
    - for_each: "color in {colors}"
      phases:
        - for_each: "size in {sizes}"
          phases:
            - show_color_size

  # --- Phase-level for_each ---
  # The for_each is on the phase itself, not in the scenario tree.
  # The runner lifts it into the tree — same behavior as scenario-level.
  test_phase_for_each:
    - show_each_animal

  # --- do_until ---
  # Execute children until a condition is met. At least one execution
  # is guaranteed (do-until = test after). Counter variable tracks iterations.
  test_do_until:
    - do_until: "empty"
      counter: attempt
      phases:
        - do_step

  # --- do_while ---
  # Execute children while a condition holds. At least one execution
  # is guaranteed (do-while = test after). Counter variable tracks iterations.
  test_do_while:
    - do_while: "true"
      counter: iteration
      phases:
        - do_step

  # --- Mixed: for_each + do_until ---
  # Outer for_each iterates colors, inner do_until retries per color.
  test_mixed:
    - for_each: "color in {colors}"
      phases:
        - show_color
        - do_until: "empty"
          counter: retry
          phases:
            - do_step

  # --- Triple nesting ---
  # Three levels of for_each: color × size × animal.
  test_triple:
    - for_each: "color in {colors}"
      phases:
        - for_each: "size in {sizes}"
          phases:
            - for_each: "animal in {animals}"
              phases:
                - show_all_three

  # Default: demonstrate basic for_each and nested
  default:
    - header
    - for_each: "color in {colors}"
      phases:
        - show_color
    - for_each: "color in {colors}"
      phases:
        - for_each: "size in {sizes}"
          phases:
            - show_color_size

phases:
  header:
    cycles: ===auto
    concurrency: 1
    ops:
      banner:
        stmt: "=== Control Flow Demonstration ==="

  show_color:
    cycles: ===auto
    concurrency: 1
    ops:
      display:
        stmt: "color = {color}"

  show_color_size:
    cycles: ===auto
    concurrency: 1
    ops:
      display:
        stmt: "color = {color}, size = {size}"

  show_each_animal:
    for_each: "animal in {animals}"
    cycles: ===auto
    concurrency: 1
    ops:
      display:
        stmt: "animal = {animal}"

  show_all_three:
    cycles: ===auto
    concurrency: 1
    ops:
      display:
        stmt: "color={color} size={size} animal={animal}"

  do_step:
    cycles: ===auto
    concurrency: 1
    ops:
      step:
        stmt: "loop step (do_while/do_until runtime eval pending)"
