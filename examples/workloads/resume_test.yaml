#!/usr/bin/env nbrs
# Resumable-workload test fixture (SRD-44; design memo
# `docs/design/resumable_test_fixture.md`).
#
# Three phases declared `checkpoint: idempotent` with progressively
# larger cycle counts. The shared `threshold` binding advances a
# state file once per session via side_effect_sequence_next_cycling.
# `trip := throw_at(cycle, threshold, "staircase")` fires when
# `cycle == threshold`; the errors cascade marks the phase Failed
# and the next invocation's resume planner classifies it as ReRun.
#
# Staircase pattern (advances per session — the state file is the
# integration test's signal channel):
#
#   invocation 1 → threshold=10  → phase1 fails at cycle 10  (cap=50)
#   invocation 2 → threshold=51  → phase1 succeeds, phase2 fails (cap=100)
#   invocation 3 → threshold=101 → phase1+phase2 succeed, phase3 fails (cap=150)
#   invocation 4 → threshold=999 → all phases succeed
#
# After the fourth invocation the cycling state file is removed
# and the next invocation restarts at threshold=10.
#
# `volatile` on the binding wires would normally mark them as
# excluded from `hash_const` — that work is deferred (see Task 172
# in tasks/), but identity is byte-stable via canonical_hash
# regardless because the live values aren't folded into the hash
# anyway.

description: |
  Resumable-workload staircase test fixture.

params:
  adapter: testkit
  errors: ".*:warn,stop"

bindings: |
  inputs := (cycle)
  # `volatile` excludes these wires' values from `hash_const`
  # so the per-invocation threshold change doesn't invalidate
  # workload identity. Also suppresses the strict-mode
  # non-deterministic warning that the empty-wiring detector
  # would otherwise raise on side_effect_sequence_next_cycling.
  volatile threshold := side_effect_sequence_next_cycling("/tmp/nbrs_resume_test.seq", "10,51,101,999")
  volatile trip := throw_at(cycle, threshold, "staircase")

phases:
  phase1:
    checkpoint: idempotent
    cycles: 50
    ops:
      step:
        stmt: "phase1 trip={trip}"

  phase2:
    checkpoint: idempotent
    cycles: 100
    ops:
      step:
        stmt: "phase2 trip={trip}"

  phase3:
    checkpoint: idempotent
    cycles: 150
    ops:
      step:
        stmt: "phase3 trip={trip}"
