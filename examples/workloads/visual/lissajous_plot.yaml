#!/usr/bin/env nbrs
# lissajous_plot.yaml — Live Lissajous figure
#
# Classic oscilloscope pattern: x = sin(a*t), y = sin(b*t + phase)
# With fade enabled, the trail decays like a phosphor screen.
#
# Usage:
#   ./examples/workloads/visual/lissajous_plot.yaml
#   ./examples/workloads/visual/lissajous_plot.yaml fade=0.03
#   ./examples/workloads/visual/lissajous_plot.yaml a=5 b=4

params:
  adapter: plotter
  mode: parametric
  a: "3"
  b: "2"
  phase: "90"
  cycles: "3000"

bindings: |
  inputs := (cycle)
  t := to_f64(cycle) * 0.005
  x := sin(t * {a})
  y := sin(t * {b} + to_f64({phase}) * 0.01745329)

ops:
  point:
    x: "{x}"
    y: "{y}"
