# synthetic_metrics.yaml — SRD-40b end-to-end demo
#
# Exercises every new SRD-40b schema element in a self-
# contained workload that runs against the stdout adapter
# (no external dependencies). Used as both:
#
#   - User-facing reference: read this file to see how
#     synthetic metrics declare on op templates.
#   - Test fixture: `nbrs/tests/workload_examples.rs` runs
#     this workload via `cargo test --workspace` to verify
#     the end-to-end synthetic-metric publication path.
#
# What's covered:
#   - `metrics:` mapping form with full MetricSpec fields
#     (`value`, `kind`, `unit`, `format`).
#   - `metrics:` bare-string sugar (single bare name).
#   - `metrics:` list form with both bare-name and
#     `wire := <expr>` entries (auto-injects the wire into
#     op-level bindings).
#   - All three kinds: `gauge`, `histogram`, `counter`.
#   - `format:` Excel-style hash-pattern sanitiser
#     (`#.##` → round to 2 decimal places at storage time).
#   - `unit:` flowing into both family-name suffix AND
#     `metric_family.unit` column.
#   - `stdout: eventlog` channel — the stdout adapter
#     suppresses terminal noise so the metric is the
#     observable signal.
#
# Usage:
#   nbrs run workload=examples/workloads/synthetic_metrics.yaml \
#       --session-path /tmp/synth-demo cycles=12
#
#   sqlite3 /tmp/synth-demo/metrics.db \
#       "SELECT name, type, unit FROM metric_family;"

description: |
  Demonstrates SRD-40b synthetic metrics: formula-driven
  gauges/histograms/counters published per cycle through
  the standard metrics pipeline.

phases:
  predict:
    cycles: "{cycle_count}"
    # Phase-level bindings — `cycle` is the implicit input,
    # everything else derives from it. Kept simple
    # arithmetic so the demo focuses on metric
    # declaration, not GK syntax.
    bindings: |
      load := add(cycle, 1)
      latency_curve := mul(load, 2)

    ops:
      synth_op:
        adapter: stdout
        # SRD-40b §9: route adapter output to event log
        # rather than the user-facing terminal. The metric
        # is the point; the rendered statement is incidental.
        params:
          stdout: eventlog
        stmt: "predict[load={load}] latency_curve={latency_curve}"

        # Mapping form (canonical) — every MetricSpec field
        # set explicitly. Unit suffix `_ms` lands on both the
        # family name (`latency_curve_ms`) and the
        # metric_family.unit column.
        metrics:
          latency_curve:
            value: latency_curve
            kind: gauge
            unit: ms
            format: "#.##"

      synth_op_simple:
        adapter: stdout
        params:
          stdout: eventlog
        stmt: "simple[load={load}]"
        # Bare-string sugar — single metric, family + value
        # both = "load", kind defaults to gauge, no unit.
        metrics: load

      synth_op_list:
        adapter: stdout
        params:
          stdout: eventlog
        stmt: "list[load={load}]"
        # List form — mix of bare names (refer to existing
        # bindings) and wire expressions (auto-injected as
        # op-level bindings). The forecast_low / forecast_high
        # wires don't exist anywhere else; they're declared
        # by these `:=` entries.
        metrics:
          - load
          - forecast_low := mul(latency_curve, 0.9)
          - forecast_high := mul(latency_curve, 1.1)

      synth_op_kinds:
        adapter: stdout
        params:
          stdout: eventlog
        stmt: "kinds[load={load}]"
        bindings: |
          // A small monotonic increment for the counter,
          // and a per-cycle distribution sample for the
          // histogram. Everything stays integer so the
          // counter cast (f64 → u64) is lossless.
          step := 1
          observation := mod(cycle, 100)
        # Demonstrate all three kinds with explicit settings.
        metrics:
          step_counter:
            value: step
            kind: counter
            unit: ops
          observation_dist:
            value: observation
            kind: histogram

scenarios:
  default:
    - predict

# Workload params accept overrides via CLI
# (`cycle_count=20`). Default keeps the demo small for
# the test fixture.
params:
  cycle_count: 6
