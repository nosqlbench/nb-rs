#!/usr/bin/env nbrs
# Reduced reproducer for SRD-66's detect-then-pick pattern.

description: |
  Minimal scope-chain reproducer for SRD-66 detect-then-pick.

params:
  adapter: stdout
  inner_options: "lo,hi"
  dataset: "example_dataset"
  prefix: "px_"
  keyspace: "ks1"

bindings: |
  # Reference workload params via interpolation — same shape as
  # full_cql_vector's `profiles := matching_profiles("{dataset}",
  # "{prefix}")` binding.
  selector := mod(cycle, 1)
  combo_label := str_concat("{dataset}", "{prefix}", "{keyspace}")
  shared has_a := true
  shared has_b := false

scenarios:
  default:
    - for: "outer in p1, p2"
      phases:
        - for: "inner in {inner_options}, label in tag_{outer}_{inner}"
          phases:
            - setup
            - consume

phases:
  setup:
    cycles: 1
    concurrency: 1
    ops:
      noop:
        stmt: "spc/setup outer={outer} inner={inner} label={label}"

  consume:
    cycles: 1
    concurrency: 1
    bindings: |
      chosen := pick(has_a, has_b, "alpha_table", "beta_table")
    ops:
      report:
        stmt: "spc/consume outer={outer} inner={inner} chosen={chosen}"
