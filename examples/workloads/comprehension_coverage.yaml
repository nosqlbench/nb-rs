#!/usr/bin/env nbrs
# comprehension_coverage.yaml — Thematic coverage workload for the
# comprehension / iteration surface (SRD 18b / 18c / 18d / 18e).
#
# Follows the `<theme>_coverage.yaml` pattern: one operator-readable
# artifact carrying every supported iteration shape on the
# `for: "<var> in <expr>"` axis, paired with a matching
# `nbrs/tests/comprehension.rs` test file.
#
# Each scenario emits a stable `cmp/<scenario>` prefixed line per
# iteration tuple. Tests grep for the prefix and assert against
# the resulting line set.
#
# Themes (each line in `scenarios:` is one shape):
#   - Forms (single, multi-clause, array, union, subspace union)
#   - `where` filter
#   - Range operator (half-open, inclusive, step)
#   - Named generators (fib, pow2, geometric, subdivide, …)
#   - Set operators (union, intersect, diff)
#   - Traversal orders (lex, lex/N truncation)
#   - Tuple LHS / parallel-iter (zip)
#   - `all(<cursor>)` cursor-extent generator
#   - Dependent clauses (clause N references clauses 0..N-1)
#
# Run individually:
#   nbrs run workload=examples/workloads/comprehension_coverage.yaml \
#            scenario=<one of the scenario names below>

bindings: |
  # Cursor declared at workload level so `all(row)` is visible
  # to scenario-tree comprehensions.
  cursor row = range(0, 50)

params:
  # Workload params used by dependent-clause scenarios.
  k_values: "1, 10"
  k_1_limits: "1, 2"
  k_10_limits: "10, 20, 30"

scenarios:

  # ─────────────────────────────────────────────────────────────
  # Form shapes (single, multi-clause, array, union)
  # ─────────────────────────────────────────────────────────────

  form_single_var:
    - for: "x in 1,2,3"
      phases: [emit_x]

  form_for_keyword_synonym:
    # `for:` is a YAML synonym for `for_each:`.
    - for_each: "x in 1,2,3"
      phases: [emit_x]

  form_inline_cartesian:
    - for: "x in 1,2,3, y in a,b"
      phases: [emit_xy]

  form_array_cartesian:
    - for:
      - "x in 1,2,3"
      - "y in a,b"
      phases: [emit_xy]

  form_array_single_entry_multi_clause:
    - for:
      - "x in 1,2,3, y in a,b"
      phases: [emit_xy]

  form_repeated_var_union:
    - for:
      - "x in 1"
      - "x in 2"
      - "x in 3"
      phases: [emit_x]

  form_subspace_union:
    - for:
      - "x in 10,  y in a,b,c"
      - "x in 100, y in d,e,f"
      phases: [emit_xy]

  # ─────────────────────────────────────────────────────────────
  # `where` filter predicate
  # ─────────────────────────────────────────────────────────────

  where_cartesian_filter:
    - for: "k in 10,100, limit in 1,10,50,100"
      where: "{k} * {limit} < 1000"
      phases: [emit_kl]

  where_union_filter:
    - for:
      - "k in 1,2,3"
      - "k in 10,20,30"
      where: "{k} > 2"
      phases: [emit_k]

  # ─────────────────────────────────────────────────────────────
  # Range operator (SRD-18c Layer 2)
  # ─────────────────────────────────────────────────────────────

  range_half_open:
    - for: "n in 1..5"
      phases: [emit_n]

  range_inclusive:
    - for: "n in 1..=5"
      phases: [emit_n]

  range_with_step:
    - for: "n in 1..10..2"
      phases: [emit_n]

  range_inclusive_with_step:
    - for: "n in 1..=10..2"
      phases: [emit_n]

  # ─────────────────────────────────────────────────────────────
  # Named generators (SRD-18c Layer 3)
  # ─────────────────────────────────────────────────────────────

  gen_fib_count:
    - for: "n in fib(7)"
      phases: [emit_n]

  gen_pow2_count:
    - for: "n in pow2(6)"
      phases: [emit_n]

  gen_geometric:
    - for: "n in geometric(1, 2, 5)"
      phases: [emit_n]

  gen_subdivide:
    # 5 half-open subdivisions of [0.0, 1.0] → 0.0, 0.2, 0.4, 0.6, 0.8.
    - for: "n in subdivide(0.0, 1.0, 5)"
      phases: [emit_n]

  gen_linear_steps:
    # 5 inclusive samples from 0..100 → 0, 25, 50, 75, 100.
    - for: "n in linear_steps(0, 100, 5)"
      phases: [emit_n]

  # ─────────────────────────────────────────────────────────────
  # Set operators (SRD-18c Layer 5)
  # ─────────────────────────────────────────────────────────────

  setop_union:
    # `unique(a, b, ...)` concatenates then dedups — set union
    # semantics. Sources are GK exprs (ranges, generators, ...).
    - for: "n in unique(1..=3, 3..=5)"
      phases: [emit_n]

  setop_intersect:
    # `intersect(a, b)` keeps only values present in both.
    - for: "n in intersect(1..=3, 2..=4)"
      phases: [emit_n]

  setop_difference:
    # `subtract(a, b)` drops values in `b` from `a`. Stepped
    # range `2..=4..2` gives just [2, 4].
    - for: "n in subtract(1..=4, 2..=4..2)"
      phases: [emit_n]

  # ─────────────────────────────────────────────────────────────
  # Traversal orders (SRD-18d)
  # ─────────────────────────────────────────────────────────────

  order_lex_with_truncation:
    # `order: "lex/5"` — lex traversal, truncate to first 5
    # tuples. YAML carries `order` as a sibling field of `for:`.
    - for: "n in 1..=10"
      order: "lex/5"
      phases: [emit_n]

  # ─────────────────────────────────────────────────────────────
  # Tuple LHS / parallel-iter (SRD-18c §"Parallel-iter")
  # ─────────────────────────────────────────────────────────────

  tuple_lhs_zip_strict:
    # Strict zip — each parenthesised RHS element is one source
    # expression (range / generator / list), and elements zip
    # together in lockstep. Length mismatch is a strict-mode
    # error at scope-init.
    - for: "(a, b) in (1..=3, 10..=30..10)"
      phases: [emit_ab]

  # ─────────────────────────────────────────────────────────────
  # `all(<cursor>)` generator (SRD-18c Layer 3, special)
  # ─────────────────────────────────────────────────────────────

  cursor_all_full_extent:
    # Cursor `row` is declared at workload level with range(0, 50).
    # `all(row)` iterates the full extent.
    - for: "xval in all(row)"
      phases: [emit_xval]

  cursor_all_with_where:
    - for: "xval in all(row)"
      where: "{xval} % 10 == 0"
      phases: [emit_xval]

  cursor_all_with_lex_truncate:
    - for: "xval in all(row)"
      order: "lex/5"
      phases: [emit_xval]

  # ─────────────────────────────────────────────────────────────
  # Dependent clauses (clause N references clauses 0..N-1)
  # ─────────────────────────────────────────────────────────────

  dependent_clauses:
    # `limit in {k_{k}_limits}` references `k`'s current value
    # to pick which workload-param list to expand. This is the
    # SRD-18b "dependent tuple comprehension" form.
    - for: "k in {k_values}, limit in {k_{k}_limits}"
      phases: [emit_kl]

# ─────────────────────────────────────────────────────────────────
# Phases — each emits a stable `cmp/...` prefix tied to the bound
# variable shape, so tests can grep and count without ambiguity.
# ─────────────────────────────────────────────────────────────────

phases:

  emit_x:
    adapter: stdout
    cycles: 1
    concurrency: 1
    ops:
      info:
        stmt: "cmp/x x={x}"

  emit_xy:
    adapter: stdout
    cycles: 1
    concurrency: 1
    ops:
      info:
        stmt: "cmp/xy x={x} y={y}"

  emit_k:
    adapter: stdout
    cycles: 1
    concurrency: 1
    ops:
      info:
        stmt: "cmp/k k={k}"

  emit_kl:
    adapter: stdout
    cycles: 1
    concurrency: 1
    ops:
      info:
        stmt: "cmp/kl k={k} limit={limit}"

  emit_n:
    adapter: stdout
    cycles: 1
    concurrency: 1
    ops:
      info:
        stmt: "cmp/n n={n}"

  emit_ab:
    adapter: stdout
    cycles: 1
    concurrency: 1
    ops:
      info:
        stmt: "cmp/ab a={a} b={b}"

  emit_xval:
    adapter: stdout
    cycles: 1
    concurrency: 1
    ops:
      info:
        stmt: "cmp/xval xval={xval}"
