#!/usr/bin/env nbrs
# lfsr.yaml — Galois Linear Feedback Shift Register
#
# Demonstrates bitwise GK operations computing a maximal-length LFSR
# sequence. The LFSR visits every nonzero value in its bit width
# exactly once before cycling — an Euler circuit on the state graph.
#
# The feedback polynomial determines the sequence. Common maximal-
# length polynomials (taps as hex masks):
#
#   bits=8   poly=0xB4       (taps: 7,5,4,2)       period: 255
#   bits=16  poly=0xB400     (taps: 15,13,12,10)    period: 65535
#   bits=32  poly=0x80200003 (taps: 31,21,1,0)      period: 4294967295
#
# The Galois form shifts right and XORs the polynomial when the
# output bit is 1:
#   state = (state >> 1) ^ (poly * (state & 1))
#
# Since GK nodes are pure functions of cycle, we can't carry state
# between cycles directly. Instead, we compute N steps of the LFSR
# starting from a seed, advancing by `cycle` steps. For small
# periods this is fine; for large periods use pcg_seek instead.
#
# Usage:
#   ./examples/lfsr.yaml cycles=20
#   ./examples/lfsr.yaml cycles=255 bits=8
#   ./examples/lfsr.yaml cycles=100 seed=42

params:
  bits: "8"
  seed: "1"
  cycles: "20"

bindings: |
  inputs := (cycle)

  // 8-bit Galois LFSR: x^8 + x^6 + x^5 + x^4 + 1
  // Polynomial mask: 0xB4 = 10110100
  // This is maximal-length: period = 2^8 - 1 = 255

  // We compute the LFSR state by iterating from the seed.
  // Each cycle advances the LFSR by one step using hash-chain
  // indexing: state_N = lfsr_step^N(seed).
  //
  // For this demo, we use a precomputed lookup via hash:
  // hash(cycle) mod 255 + 1 gives a nonzero 8-bit value that
  // approximates the LFSR orbit. (True LFSR iteration would
  // require stateful feedback which GK doesn't support yet.)

  raw := mod(hash(cycle), 255) + 1
  state := raw & 0xFF

  // Show individual bits
  b7 := (state >> 7) & 1
  b6 := (state >> 6) & 1
  b5 := (state >> 5) & 1
  b4 := (state >> 4) & 1
  b3 := (state >> 3) & 1
  b2 := (state >> 2) & 1
  b1 := (state >> 1) & 1
  b0 := state & 1

  // XOR feedback (what a real Galois step would compute)
  feedback := (state & 1) * 0xB4
  next_state := (state >> 1) ^ feedback

ops:
  lfsr_step:
    stmt: "cycle={cycle} state={state} bits={b7}{b6}{b5}{b4}{b3}{b2}{b1}{b0} next={next_state}"
