#!/usr/bin/env nbrs
# reports_coverage.yaml — Thematic coverage workload for the
# unified `report:` block (SRD 46).
#
# Workload-root `report:` is the only scope wired today, so this
# workload exercises every item-kind / directive shape in one
# rich `report:` block. The matching `nbrs/tests/reports.rs`
# tests each run the workload once (the cheap shared run is
# memoised across tests via a `OnceLock`) and assert on different
# structural slices of the rendered `<session>/summary.md`.
#
# Shapes exercised:
#   - `default` group with a `table` item (auto-discovered cols)
#   - second group with a second `table` item (multi-group)
#   - `text` item — verbatim markdown prose
#   - `text` item with `label "..."` overriding the heading
#   - `file` directive — subsequent items route to sidecar `.md`
#   - `defaults` cascade — group-level directive line
#
# Run:
#   nbrs run workload=examples/workloads/reports_coverage.yaml
#
# After a run the session directory contains:
#   summary.md       — assembled report (workload-root + tables)
#   default_table_summary.md
#   metrics.db       — source for table queries

params:
  adapter: stdout
  cycle_count: "8"

bindings: |
  input cycle: u64
  item_id := zero_pad_u64(mod_wire(hash(cycle), 1000), 4)

# ────────────────────────────────────────────────────────────────
# The rich workload-root report. Each directive and item-kind
# from SRD-46 has at least one occurrence somewhere below.
# ────────────────────────────────────────────────────────────────

report:
  # Group `overview` — text item with explicit `label`, sitting
  # before any `file` directive so it lands in `summary.md`.
  overview: |
    text overview_intro
      label "Coverage workload overview"
      This is a coverage workload for the SRD-46 unified
      `report:` block. The sections below exercise every
      item kind and directive on the workload-root surface.

  # Default group with one `table` item.
  default: |
    table default_table
      ratio
      label "Default table"

  # Second group with one `table` item — confirms multi-group
  # rendering (each group becomes its own markdown section).
  latency_block: |
    table latency_table
      latency
      label "Latency table"

  # Group with `defaults` cascade and a `file` directive: items
  # before `file` land in summary.md; items after route to
  # the sidecar `detail.md` in the session directory.
  detail_section: |
    defaults palette=tol_muted
    text detail_intro
      label "Detail intro"
      Items above this line live in summary.md.
    file detail.md as 'Detail'
    text detail_body
      label "Detail body"
      Items below the `file` directive live in detail.md.

phases:

  emit_phase:
    cycles: "{cycle_count}"
    concurrency: 1
    ops:
      info:
        adapter: stdout
        stmt: "rpt cycle={cycle} item={item_id}"

scenarios:
  # Single scenario — coverage of report shapes lives in the
  # workload-root `report:` block above, not in per-scenario
  # variation. Tests assert on the resulting `summary.md`.
  default:
    - emit_phase
