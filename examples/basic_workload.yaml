# basic_workload.yaml — A simple workload for testing nbrs
#
# Usage:
#   nbrs run workload=examples/basic_workload.yaml cycles=10
#   nbrs run workload=examples/basic_workload.yaml cycles=20 format=json
#   nbrs run workload=examples/basic_workload.yaml tags=block:main cycles=100 threads=4

description: |
  A basic workload with schema setup and main read/write operations.

bindings:
  user_id: Hash(); Mod(1000000)
  seq: Identity()

blocks:
  schema:
    ops:
      create_table:
        stmt: "CREATE TABLE IF NOT EXISTS users (id int PRIMARY KEY, name text);"
  main:
    ops:
      write:
        ratio: 3
        stmt: "INSERT INTO users (id, name) VALUES ({user_id}, 'user_{seq}');"
      read:
        ratio: 1
        stmt: "SELECT * FROM users WHERE id={user_id};"
