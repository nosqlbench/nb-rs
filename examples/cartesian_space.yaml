# cartesian_space.yaml — Cartesian coordinate decomposition from cycle
#
# Demonstrates how a single monotonic cycle counter decomposes into
# a multi-dimensional coordinate space using mixed_radix. Each cycle
# maps to a unique (x, y, z) point in the grid, and downstream
# nodes generate per-point properties from those coordinates.
#
# Grid: 100 × 100 × 100 = 1,000,000 unique points
#
# Cycle ordering traverses the grid in nested-loop order:
#   cycle 0     → (0, 0, 0)
#   cycle 1     → (1, 0, 0)      x increments first
#   cycle 99    → (99, 0, 0)
#   cycle 100   → (0, 1, 0)      then y
#   cycle 10000 → (0, 0, 1)      then z
#
# Usage:
#   nbrs run workload=examples/cartesian_space.yaml cycles=20
#   nbrs run workload=examples/cartesian_space.yaml cycles=1M format=json threads=8

description: |
  3D cartesian grid traversal. Each cycle is a unique point in a
  100×100×100 space with derived density, label, and temperature.

bindings: |
  coordinates := (cycle)

  // === Coordinate decomposition ===
  // Unpack cycle into three orthogonal dimensions (each 0..99)
  (x, y, z) := mixed_radix(cycle, 100, 100, 0)

  // === Per-axis hashing for independent randomness ===
  hx := hash(x)
  hy := hash(y)
  hz := hash(z)

  // === Point identity ===Ï
  // Combine all three axes into a single hash for this point
  xy := interleave(hx, hy)
  point_hash := hash(interleave(xy, hz))
  point_id := mod(point_hash, 10000000)

  // === Derived properties from the coordinate space ===

  // Density: determined by (x, y) position only — constant along z.
  // All z-slices at the same (x,y) share the same density.
  density_q := unit_interval(hash(interleave(hx, hy)))
  density := icd_normal(density_q, 1.0, 0.2)

  // Temperature: varies with z (depth), independent of x,y.
  // unit_interval(hz) gives a per-layer noise factor in [0,1).
  temp_q := unit_interval(hz)
  temperature := icd_normal(temp_q, 20.0, 5.0)

  // Category: purely from point_hash, 8 categories
  category := mod(point_hash, 8)

blocks:
  populate:
    ops:
      insert_point:
        ratio: 1
        stmt: "INSERT INTO points (id, x, y, z, density, temp, cat) VALUES ({point_id}, {x}, {y}, {z}, {density}, {temperature}, {category});"
