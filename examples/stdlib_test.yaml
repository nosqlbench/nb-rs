# stdlib_test.yaml — Tests stdlib module resolution
#
# References stdlib modules that are embedded in the nbrs binary.
# No .gk files needed in this directory — the stdlib is always available.
#
# Usage:
#   nbrs run workload=examples/stdlib_test.yaml cycles=10

description: Test embedded stdlib module resolution.

bindings: |
  // Uses stdlib: hashing.gk → hash_range
  user_id := hash_range(input: cycle, max: 1000000)

  // Uses stdlib: distributions.gk → normal_sample
  score := normal_sample(input: cycle, mean: 50.0, stddev: 10.0)

  // Uses stdlib: timeseries.gk → monotonic_ts
  ts := monotonic_ts(input: cycle, base_epoch: 1710000000000, interval_ms: 1000)

blocks:
  main:
    ops:
      insert:
        stmt: "INSERT INTO t (id, score, ts) VALUES ({user_id}, {score}, {ts});"
