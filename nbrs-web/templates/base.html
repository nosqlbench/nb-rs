<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}nbrs{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-ws@2.0.2/ws.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/litegraph.js@0.7.18/css/litegraph.css">
    <script src="https://cdn.jsdelivr.net/npm/litegraph.js@0.7.18/build/litegraph.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.35.0.min.js" charset="utf-8"></script>
    <style>
        :root {
            --bg: #1a1a2e;
            --surface: #16213e;
            --border: #0f3460;
            --text: #e0e0e0;
            --text-dim: #8888a0;
            --accent: #e94560;
            --green: #4ecca3;
            --yellow: #f0c040;
            --blue: #4da6ff;
            --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--mono);
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            line-height: 1.6;
        }
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 24px;
        }
        header h1 {
            font-size: 18px;
            color: var(--accent);
            font-weight: 700;
        }
        header nav a {
            color: var(--text-dim);
            text-decoration: none;
            padding: 4px 12px;
            border-radius: 4px;
        }
        header nav a:hover, header nav a.active {
            color: var(--text);
            background: var(--border);
        }
        main {
            padding: 24px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .card h2 {
            font-size: 14px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        .grid { display: grid; gap: 16px; }
        .grid-2 { grid-template-columns: 1fr 1fr; }
        .grid-3 { grid-template-columns: 1fr 1fr 1fr; }
        .grid-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
        .stat {
            text-align: center;
            padding: 12px;
        }
        .stat .value {
            font-size: 28px;
            font-weight: 700;
            color: var(--green);
        }
        .stat .label {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 8px 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th {
            color: var(--text-dim);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge-green { background: rgba(78, 204, 163, 0.2); color: var(--green); }
        .badge-yellow { background: rgba(240, 192, 64, 0.2); color: var(--yellow); }
        .badge-red { background: rgba(233, 69, 96, 0.2); color: var(--accent); }
        .badge-blue { background: rgba(77, 166, 255, 0.2); color: var(--blue); }
        pre {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 12px;
            overflow-x: auto;
            font-size: 13px;
        }
        .htmx-indicator { opacity: 0; transition: opacity 200ms; }
        .htmx-request .htmx-indicator { opacity: 1; }
        @media (max-width: 900px) {
            .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <header>
        <h1>nbrs</h1>
        <nav>
            <a href="/" data-tab="dashboard" onclick="switchTab('dashboard', '/', event)"
               {% block nav_dashboard %}{% endblock %}>Dashboard</a>
            <a href="/functions" data-tab="functions" onclick="switchTab('functions', '/functions', event)"
               {% block nav_functions %}{% endblock %}>Functions</a>
            <a href="/stdlib" data-tab="stdlib" onclick="switchTab('stdlib', '/stdlib', event)"
               {% block nav_stdlib %}{% endblock %}>Stdlib</a>
            <a href="/dag" data-tab="dag" onclick="switchTab('dag', '/dag', event)"
               {% block nav_dag %}{% endblock %}>DAG Viewer</a>
            <a href="/graph" data-tab="graph" onclick="switchTab('graph', '/graph', event)"
               {% block nav_graph %}{% endblock %}>Graph Editor</a>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <script>
    // Tab switching: show/hide panes instead of replacing content.
    // Each pane is lazily loaded on first visit, then preserved.
    const tabPanes = {};
    let activeTab = null;

    function switchTab(tabName, url, event) {
        event.preventDefault();

        // Hide current pane (don't destroy it)
        if (activeTab && tabPanes[activeTab]) {
            tabPanes[activeTab].style.display = 'none';
        }

        const main = document.querySelector('main');

        // If pane already loaded, just show it
        if (tabPanes[tabName]) {
            tabPanes[tabName].style.display = 'block';
            activeTab = tabName;
            updateNavActive(tabName);
            history.pushState({tab: tabName}, '', url);
            return;
        }

        // First visit: fetch content and create a persistent pane
        fetch(url, { headers: { 'HX-Request': 'true' } })
            .then(r => r.text())
            .then(html => {
                const pane = document.createElement('div');
                pane.className = 'tab-pane';
                pane.dataset.tab = tabName;
                pane.innerHTML = html;
                main.appendChild(pane);

                // Execute any <script> tags in the loaded content
                pane.querySelectorAll('script').forEach(oldScript => {
                    const newScript = document.createElement('script');
                    if (oldScript.src) {
                        newScript.src = oldScript.src;
                    } else {
                        newScript.textContent = oldScript.textContent;
                    }
                    oldScript.replaceWith(newScript);
                });

                // Tell htmx to process any hx-* attributes in the new content
                if (typeof htmx !== 'undefined') {
                    htmx.process(pane);
                }

                tabPanes[tabName] = pane;
                activeTab = tabName;
                updateNavActive(tabName);
                history.pushState({tab: tabName}, '', url);
            });
    }

    function updateNavActive(tabName) {
        document.querySelectorAll('header nav a').forEach(a => {
            a.classList.toggle('active', a.dataset.tab === tabName);
        });
    }

    // On initial page load, register the current content as the active tab pane
    (function() {
        const main = document.querySelector('main');
        const path = window.location.pathname;
        const tabMap = {'/': 'dashboard', '/functions': 'functions', '/stdlib': 'stdlib',
                        '/dag': 'dag', '/graph': 'graph'};
        const currentTab = tabMap[path] || 'dashboard';

        // Wrap existing main content in a pane div
        const pane = document.createElement('div');
        pane.className = 'tab-pane';
        pane.dataset.tab = currentTab;
        while (main.firstChild) pane.appendChild(main.firstChild);
        main.appendChild(pane);
        tabPanes[currentTab] = pane;
        activeTab = currentTab;
        updateNavActive(currentTab);
    })();

    // Handle browser back/forward
    window.addEventListener('popstate', function(e) {
        if (e.state && e.state.tab) {
            const tabName = e.state.tab;
            if (tabPanes[activeTab]) tabPanes[activeTab].style.display = 'none';
            if (tabPanes[tabName]) {
                tabPanes[tabName].style.display = 'block';
                activeTab = tabName;
                updateNavActive(tabName);
            }
        }
    });
    </script>
</body>
</html>
