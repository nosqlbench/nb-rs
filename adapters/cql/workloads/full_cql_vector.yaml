#!/usr/bin/env nbrs
# CQL Vector Search — Multi-Profile Discovery
#
# Generic phases parameterized by {table}, {dataset}, and {profile}.
# Scenario trees set {profile} (and sometimes {table}) via for
# iteration variables. Dataset-facing calls use the canonical
# "{dataset}:{profile}" composite inline format.
#
# Usage:
#   nbrs full_cql_vector.yaml scenario=fulltest
#   nbrs full_cql_vector.yaml scenario=filtered_knn
#   nbrs full_cql_vector.yaml scenario=unfiltered
#   nbrs full_cql_vector.yaml scenario=filtered_knn limit=100

params:
  host: localhost
  adapter: cql
  dataset: example
  prefix: ""
  oracles_prefix: "label_"
  keyspace: baselines
  k_values: "1,10,100"
  k_1_limits: "1,2,4,8,16,32,64"
  k_10_limits: "10,20,30,40,50"
  k_100_limits: "100,200,300,400,500"
  concurrency: "100"
  query_concurrency: "20"
  replication: "{'class': 'SimpleStrategy', 'replication_factor': '1'}"
  fknn_profile: default
  vector_idx_suffix: _vector_idx
  meta_idx_suffix: _meta_idx
  # Minimum wall-clock duration per ann_query / pvs_query phase
  # in milliseconds. The query cursor extends in `base`-sized
  # passes (one full sweep of the prebuffered query set) until
  # this much time has elapsed since phase start, at which point
  # the policy stops at the next whole-pass boundary. 60 s gives
  # each (profile, k, limit) phase enough cadence-window
  # coverage for stable rate and latency averages.
  min_query_ms: 15000

# Unified report block (SRD-46): plots + tables in declaration
# order. Each scenario contributes its items to its own
# scenario-specific markdown file so the post-run reports stay
# scoped to the data they describe.
#
# Scenarios:
#   - `test_oracles` → ANN/recall sweep, emits recall@N metrics
#     under the `ann_query` phase.
#   - `test_fknn`    → filtered-KNN sweep, emits recall metrics
#     under the `pvs_query` phase.
#
# A `Run Details` block is auto-prepended to each markdown
# file by the runtime — no need to declare it here.

# Surface recall-family aggregates and latency on the inline
# progress line and per-phase ✓ DONE summary. Doc-root setting
# is inherited by every phase that doesn't declare its own
# `status_metrics:`. Glob patterns: `recall*` matches the
# `recall` family (with `k`/`r` labels carrying the cutoff)
# from the relevancy block; `latency*` matches the
# `latency_p50` / `latency_p99` / `latency_max` /
# `latency_mean` family sourced from the service-time histogram.
status_metrics: [recall*, latency*]

report:
  defaults:
    palette: wong

  oracles_section: |
    file oracles_report.md as 'ANN Recall Sweep'

    text 
     This report covers the **test_oracles** scenario: per-
     profile partition tests that sweep `k` and `limit` against
     a SAI-indexed vector column. Recall is measured against the
     ground truth provided by the dataset's test set.

     Figures below show the per-profile and aggregate recall@k
     curves; the table summarises mean recall by profile.

    table recall_oracles
      group_by: profile
      query recall: avg(recall_mean{k="10"}) by (profile,limit)
      query latency: avg(cycles_servicetime_mean) by (profile,limit)

    plot recall_vs_qps
      label "Recall vs QPS, (oracles & PVS)"
      legend: br
      y1: (cycles_total_rate, recall_mean){phase=~".*query"} by (phase,k,limit)
      point-label1: limit
      x-legend: "QPS (log)"
      xscale=log
      y-side: left
      y-labels: ["recall"]
      y-legends: ["k=[k] [phase]"]
      y-ranges: [[,1.0]]
      series: phase,k
      style phase=ann_query:line=dotted

    plot recall_vs_qps__pvs
      label "Recall vs QPS (PVS)"
      legend: br
      y1: (cycles_total_rate, recall_mean){phase=~"pvs_query"} by (phase,k,limit)
      point-label1: limit
      x-legend: "QPS"
      xscale=log
      y-side: left
      y-labels: ["recall"]
      y-legends: ["k=[k] [phase]"]
      y-ranges: [[,1.0]]
      series: phase,k
      style phase=ann_query:line=dotted


bindings: |
  profiles := matching_profiles("{dataset}", "{prefix}")

scenarios:

  default:
    - scenario: fulltest

  fulltest:
    - scenario: test_oracles
    - scenario: test_fknn
    # One-shot diagnostic probe — runs the SAME query
    # against both oracle and PVS tables and dumps
    # bindings + DB result bodies to <session>/audit.log.
    # Both tables must already exist; placement after
    # test_fknn guarantees that.
    - recall_audit_oracle
    - recall_audit_pvs

  # Standalone diagnostic scenario — invoke with
  # `scenario=recall_audit_only` to run JUST the probe
  # against leftover tables from a previous fulltest run.
  # Skips teardown / schema / rampup / await_index, so
  # the existing data is used as-is. Errors out if the
  # tables `vec_label_00_recall` or `fknn_default_recall`
  # don't exist; run `fulltest` first to populate them.
  recall_audit_only:
    - recall_audit_oracle
    - recall_audit_pvs

  # Per-profile partition test (label_00..label_11)
  test_oracles:
    - for: "profile in matching_profiles('{dataset}', '{oracles_prefix}')"
      phases:
        - for: "table in vec_{profile}"
          phases:
            - teardown
            - schema
            - rampup
            - jolokia_flush
            - jolokia_compact
            - jolokia_await_compaction
            - for: "k in {k_values}, limit in {k_{k}_limits}"
              phases:
                - ann_query

  # Query-only oracle scenario — same parameter sweep as
  # `test_oracles` but skips teardown/schema/rampup/await_index.
  # Use against tables already populated by a prior `test_oracles`
  # run to measure recall as the SAI index ages without
  # re-paying the rampup cost. If recall here climbs over
  # repeated invocations, the SAI index hasn't fully settled by
  # the time `await_index`'s polling returns.
  test_oracles_query_only:
    - for: "profile in matching_profiles('{dataset}', '{oracles_prefix}')"
      phases:
        - for: "table in vec_{profile}"
          phases:
            - for: "k in {k_values}, limit in {k_{k}_limits}"
              phases:
                - ann_query

  test_fknn:
    - for: "profile in {fknn_profile}, table in fknn_{profile}"
      phases:
        - teardown
        - schema
        - fknn_rampup_data
        - jolokia_flush
        - jolokia_compact
        - jolokia_await_compaction
        - for: "k in {k_values}, limit in {k_{k}_limits}"
          phases:
            - pvs_query


# =====================================================================
# Generic Phases — parameterized by {table}, {dataset}, and {profile}
# =====================================================================

phases:

  schema:
    concurrency: 1
    bindings: |
      dim := vector_dim("{dataset}:{profile}")
      similarity_function := dataset_distance_function("{dataset}:{profile}")
    ops:
      create_keyspace:
        raw: |
          CREATE KEYSPACE IF NOT EXISTS {keyspace} 
          WITH replication = {replication} AND durable_writes = true
      create_table:
        raw: |
          CREATE TABLE IF NOT EXISTS {keyspace}.{table} 
          (key text PRIMARY KEY, value vector<float, {dim}>, metadata int)
          WITH
           compaction = {
           'class': 'SizeTieredCompactionStrategy', 
           'min_threshold': '2', 
           'max_threshold': '5' }
          AND compression = {
           'enabled': 'false'
          }

      create_vector_index:
        raw: |
          CREATE CUSTOM INDEX IF NOT EXISTS {table}{vector_idx_suffix}
          ON {keyspace}.{table} (value)
          USING 'StorageAttachedIndex'
          WITH OPTIONS = {'similarity_function': '{similarity_function}'}
      create_metadata_index:
        raw: |
          CREATE CUSTOM INDEX IF NOT EXISTS {table}{meta_idx_suffix}
          ON {keyspace}.{table} (metadata) USING 'StorageAttachedIndex'

  # Anti-DDL: tear down in reverse order (indexes → table).
  # Keyspace left intact (shared across tests).
  teardown:
    concurrency: 1
    ops:
      drop_metadata_index:
        raw: "DROP INDEX IF EXISTS {keyspace}.{table}{meta_idx_suffix}"
      drop_vector_index:
        raw: "DROP INDEX IF EXISTS {keyspace}.{table}{vector_idx_suffix}"
      drop_table:
        raw: "DROP TABLE IF EXISTS {keyspace}.{table}"

  # Trigger a memtable flush for {keyspace} via the Jolokia
  # JMX/HTTP bridge. Cassandra's `is_building=true → false`
  # signal (used by `await_index`) fires before the data has
  # been pushed to disk; until a flush happens, the SAI index
  # lives entirely in the memtable and `sai_sstable_indexes`
  # returns zero rows. Running this between rampup and the
  # query phases guarantees there's at least one on-disk
  # SSTable for the SAI index to anchor on, so the subsequent
  # `await_compaction` poll on `count == 1` actually sees the
  # state it's waiting for.
  #
  # MBean: org.apache.cassandra.db:type=StorageService
  # Operation:
  #   forceKeyspaceFlush(String keyspaceName, String[] tableNames)
  #
  # This Cassandra build requires the two-arg signature
  # (`String, String[]`); the GET-URL form can't express the
  # array argument cleanly, so we POST a JSON exec envelope
  # with an empty `[]` tables list (= flush the entire
  # keyspace).
  #
  # Jolokia ALWAYS returns HTTP 200 — the JMX call's outcome
  # lives in the response body's `status` field. The verify
  # block below asserts `status == 200` so a JMX-side error
  # (mistyped keyspace, missing MBean, permission failure)
  # surfaces as a phase error instead of being silently
  # swallowed.
  jolokia_flush:
    adapter: http
    concurrency: 1
    cycles: 1
    ops:
      flush:
        uri: "http://{host}:8778/jolokia/"
        method: POST
        body: |
          {"type":"exec",
           "mbean":"org.apache.cassandra.db:type=StorageService",
           "operation":"forceKeyspaceFlush(java.lang.String,[Ljava.lang.String;)",
           "arguments":["{keyspace}",[]]}
        verify:
          - field: status
            eq: "200"
        strict: true
        memo:
          before: "flushing keyspace {keyspace}"
          after:  "flushed keyspace {keyspace}"

  # Trigger a major compaction for {keyspace}.{table} via
  # Jolokia. After a flush, multiple SSTables typically exist
  # (one per flushed memtable + any prior segments). The
  # compaction merges them into a single SSTable, which is
  # the steady-state condition `await_compaction` polls for.
  #
  # MBean: org.apache.cassandra.db:type=StorageService
  # Operation:
  #   forceKeyspaceCompaction(boolean splitOutput,
  #                           String keyspaceName,
  #                           String... tableNames)
  # `splitOutput=false` keeps the output as a single SSTable
  # (the whole point of running this).
  #
  # `forceKeyspaceCompaction` is SYNCHRONOUS — the JMX call
  # blocks until the compaction completes. For a 1M-vector
  # table the call can take 20-30 minutes; `timeout_ms` is
  # set high enough to cover that without tripping the
  # adapter's default 30-second client timeout.
  #
  # Same Jolokia 200-in-body assertion as `jolokia_flush` —
  # don't fire and forget. The verify block ensures a JMX
  # failure (after the long wait) still fails the phase.
  jolokia_compact:
    adapter: http
    concurrency: 1
    cycles: 1
    ops:
      compact:
        uri: "http://{host}:8778/jolokia/"
        method: POST
        body: |
          {"type":"exec",
           "mbean":"org.apache.cassandra.db:type=StorageService",
           "operation":"forceKeyspaceCompaction(boolean,java.lang.String,[Ljava.lang.String;)",
           "arguments":[false,"{keyspace}",["{table}"]]}
        request_timeout_ms: 3600000
        verify:
          - field: status
            eq: "200"
        strict: true
        memo:
          before: "compacting {keyspace}.{table}"
          after:  "compacted {keyspace}.{table}"

  # Poll Jolokia until Cassandra's CompactionManager reports
  # no running compactions. The state lives on the JMX
  # ATTRIBUTE `Compactions` (read-only list of currently-
  # active compaction tasks), NOT an op like `getCompactions`
  # which this Cassandra build doesn't expose. Jolokia
  # wraps the attribute value in `{value: [...], status: 200,
  # ...}`, so the poll uses `json_path: /value` to drill into
  # the array and `await_empty` semantics (default
  # `min_rows=0, max_rows=0`) to wait until the list is
  # empty.
  #
  # Each poll iteration is a short HTTP call — the *loop*
  # is the long-running step. If a new compaction kicks off
  # mid-poll (size-tier triggered by an earlier compaction's
  # output, or a SAI side-effect of the base-table compact),
  # the array becomes non-empty again and the loop keeps
  # waiting. `request_timeout_ms: 10000` caps a single HTTP
  # call (slow JMX, GC pause) so we fail fast and resume on
  # the next interval; `poll.timeout_ms` is the overall
  # loop deadline.
  #
  # Same `status == 200` verify as the trigger phases so a
  # JMX-side failure surfaces as a phase error instead of
  # being silently swallowed.
  jolokia_await_compaction:
    adapter: http
    concurrency: 1
    ops:
      compactions_running:
        memo:
          before: "awaiting compaction on {keyspace}.{table}"
          after: "compacted {keyspace}.{table}"
        uri: "http://{host}:8778/jolokia/read/org.apache.cassandra.db:type=CompactionManager/Compactions"
        method: GET
        request_timeout_ms: 10000
        verify:
          - field: status
            eq: "200"
        strict: true
        poll:
          mode: await_empty
          interval_ms: 5000
          timeout_ms: 1800000
          max_error_retries: 3
          json_path: "/value"
          metric_name: jolokia_compaction_wait_time_s

  rampup:
    concurrency: "{concurrency}"
    bindings: |
      init prebuffered = dataset_prebuffer("{dataset}:{profile}")
      cursor row = range(0, vector_count(prebuffered))
      id := format_u64(row, 10)
      train_vector := vector_at(prebuffered, row)
    ops:
      insert:
        max_batch_size: 64KB
        batchtype: unlogged
        prepared: |
          INSERT INTO {keyspace}.{table} 
                 ( key,    value) 
          VALUES ( '{id}', {train_vector})
  # Filtered-KNN rampup: includes metadata column for predicate filtering
  fknn_rampup_data:
    concurrency: "{concurrency}"
    bindings: |
      init prebuffered = dataset_prebuffer("{dataset}:{profile}")
      cursor row = range(0, vector_count(prebuffered))
      id := format_u64(row, 10)
      train_vector := vector_at(prebuffered, row)
      meta := metadata_value_at(prebuffered, row)
    ops:
      insert:
        max_batch_size: 64KB
        batchtype: unlogged
        prepared: |
          INSERT INTO {keyspace}.{table} 
          (  key,    value,          metadata) VALUES 
          (  '{id}', {train_vector}, {meta})

  # ── Search (parameterized by {table}, {dataset}:{profile}, {k}) ────────────

  ann_query:
    concurrency: "{query_concurrency}"
    bindings: |
      init prebuffered = dataset_prebuffer("{dataset}:{profile}")
      init base = query_count(prebuffered)
      # Extending cursor: dispatch one full `base`-sized pass
      # through the prebuffered query set, then keep extending
      # by another `base` each time the cursor reaches its end
      # — until min_query_ms of wall-clock time has elapsed
      # since phase start. The policy stops at the next
      # whole-pass boundary, so each phase always runs an
      # integer number of complete passes (no partial sweep
      # of the query set).
      cursor q = until_elapsed(base, min_query_ms)
      query_vector := query_vector_at(prebuffered, q % base)
      ground_truth := neighbor_indices_at(prebuffered, q % base)

    ops:
      select_ann:
        prepared: |
          SELECT [key] FROM {keyspace}.{table}
          ORDER BY value
          ANN OF {query_vector}
          LIMIT {limit}
        # `count` is the result-body row count (a magic extern in
        # the closure-binding economy). Referencing it directly
        # from `value:` is enough — the metrics use-site walker
        # forces the `count` input slot to be allocated on the
        # op-template kernel, and the metrics wrapper reads it via
        # ctx.wires.get fresh on every cycle.
        metrics:
          rows_per_op:
            kind: gauge
            value: count
        evaluations:
          relevancy:
            actual: key
            # Bare wire-name — the evaluator reads `ground_truth`
            # via ctx.wires.get with no string round-trip; the
            # typed Value (VecI32 / VecF32 / Str) flows directly
            # to the recall computation. Legacy `"{ground_truth}"`
            # text-template form still works (braces are stripped
            # at wrap-time) but the bare form is canonical.
            expected: ground_truth
            # Bare wire-names — same one-shot wrap-time resolution
            # as the legacy "{k}" / "{limit}" text-template form.
            k: k
            r: limit
            functions:
              - recall


  # Single-cycle diagnostic phase. Runs the SAME query
  # vector against both the oracle (label_00) and PVS
  # (default WHERE metadata=0) paths, dumps the bindings
  # + result bodies via log_info, so audit.log shows:
  #
  #   - the query vector hash (proxy for "this is the
  #     same q across both probes"),
  #   - oracle's ground truth (label_00 local indices),
  #     oracle's DB result keys,
  #   - the corresponding default-side payload (PVS
  #     ground truth at default's q=0, predicate, and DB
  #     keys returned).
  #
  # The user reads audit.log to cross-check whether the
  # DB returns the same effective vectors on both paths
  # (compare returned values when extracted via
  # `SELECT key,value`).
  #
  # Hardcoded to label_00 / metadata=0. Requires the
  # `fulltest` scenario to have already populated both
  # tables; runs once after test_fknn so both targets
  # exist.
  # Single-op phase: oracle path only, iterates q=0..856
  # (all label_00 queries). Pairs with `recall_audit_pvs`
  # below; both phases iterate the SAME q range so the
  # offline analyser can join their audit.log entries by q
  # and compute per-q recall deltas (oracle vs pvs on the
  # identical query vector).
  recall_audit_oracle:
    concurrency: 1
    bindings: |
      init opb = dataset_prebuffer("{dataset}:label_00")
      cursor q = range(0, 856)
      query           := query_vector_at(opb, q)
      gt_oracle       := neighbor_indices_at(opb, q)
      _audit_marker   := log_info("=== recall_audit_oracle cycle: label_00 q=" + format_u64(q, 10) + " ===")
      _audit_gt       := log_info("gt_oracle (label_00 local indices, top-100): " + json_text(gt_oracle))
    ops:
      oracle_probe:
        prepared: |
          SELECT key, value FROM {keyspace}.vec_label_00_recall
          ORDER BY value ANN OF {query} LIMIT 10
        result: |
          _audit_oracle_result := log_info("oracle_probe body: " + json_text(body))

  # Single-op phase: PVS path only, iterates q=0..856 (same
  # range as recall_audit_oracle). Uses label_00's query
  # vectors so each q corresponds to the SAME underlying
  # query as the oracle phase's same-q cycle.
  recall_audit_pvs:
    concurrency: 1
    bindings: |
      init opb = dataset_prebuffer("{dataset}:label_00")
      cursor q = range(0, 856)
      query           := query_vector_at(opb, q)
      gt_oracle       := neighbor_indices_at(opb, q)
      _audit_marker   := log_info("=== recall_audit_pvs cycle: label_00 q=" + format_u64(q, 10) + " ===")
      _audit_gt       := log_info("gt_oracle (label_00 local indices, top-100): " + json_text(gt_oracle))
    ops:
      pvs_probe:
        prepared: |
          SELECT key, value FROM {keyspace}.fknn_default_recall
          WHERE metadata = 0
          ORDER BY value ANN OF {query} LIMIT 10
        result: |
          _audit_pvs_result := log_info("pvs_probe body: " + json_text(body))

  pvs_metadata_query:
    concurrency: "{query_concurrency}"
    errors: count
    bindings: |
      init prebuffered = dataset_prebuffer("{dataset}:{profile}")
      init query_counts = query_count(prebuffered)
      cursor q = range(0, query_counts * 1)          
      predicate := predicate_value_at(prebuffered, q % query_counts)
    ops:
      select_ann:
        # LIMIT {limit} (search depth) rather than LIMIT {k}
        # (recall cutoff). With a server that *post-filters* SAI
        # ANN+WHERE, the wider candidate set lets a larger
        # fraction of true neighbours survive the metadata
        # predicate; with a server that *pre-filters*, the LIMIT
        # is irrelevant to recall and this match the standard
        # "search depth ≥ k" recall-measurement convention. The
        # relevancy below truncates back to k via `r=limit`.
        prepared: |
          SELECT key FROM {keyspace}.{table}
          WHERE metadata = {predicate}
          LIMIT {limit}

  pvs_query:
    concurrency: "{query_concurrency}"
    errors: count
    bindings: |
      init prebuffered = dataset_prebuffer("{dataset}:{profile}")
      init query_counts = query_count(prebuffered)
      cursor q = range(0, query_counts * 10)
      query_vector := query_vector_at(prebuffered, q % query_counts)
      predicate := predicate_value_at(prebuffered, q % query_counts)
      ground_truth := filtered_neighbor_indices_at(prebuffered, q % query_counts)

    ops:
      select_ann:
        # LIMIT {limit} (search depth) rather than LIMIT {k}
        # (recall cutoff). With a server that *post-filters* SAI
        # ANN+WHERE, the wider candidate set lets a larger
        # fraction of true neighbours survive the metadata
        # predicate; with a server that *pre-filters*, the LIMIT
        # is irrelevant to recall and this match the standard
        # "search depth ≥ k" recall-measurement convention. The
        # relevancy below truncates back to k via `r=limit`.
        prepared: |
          SELECT key,value FROM {keyspace}.{table}
          WHERE metadata = {predicate}
          ORDER BY value
          ANN OF {query_vector} LIMIT {limit}
        # Same direct-reference pattern as ann_query — no
        # throw-away result-binding needed.
        metrics:
          rows_per_op:
            kind: gauge
            value: count
        evaluations:
          relevancy:
            actual: key
            # Bare wire-name — the evaluator reads `ground_truth`
            # via ctx.wires.get with no string round-trip; the
            # typed Value (VecI32 / VecF32 / Str) flows directly
            # to the recall computation. Legacy `"{ground_truth}"`
            # text-template form still works (braces are stripped
            # at wrap-time) but the bare form is canonical.
            expected: ground_truth
            # Bare wire-names — same one-shot wrap-time resolution
            # as the legacy "{k}" / "{limit}" text-template form.
            k: k
            r: limit
            functions:
              - recall



