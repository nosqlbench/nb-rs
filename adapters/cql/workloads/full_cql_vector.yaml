#!/usr/bin/env nbrs
# CQL Vector Search — Multi-Profile Discovery
#
# Generic phases parameterized by {table}, {dataset}, and {profile}.
# Scenario trees set {profile} (and sometimes {table}) via for
# iteration variables. Dataset-facing calls use the canonical
# "{dataset}:{profile}" composite inline format.
#
# Usage:
#   nbrs full_cql_vector.yaml scenario=fulltest
#   nbrs full_cql_vector.yaml scenario=filtered_knn
#   nbrs full_cql_vector.yaml scenario=unfiltered
#   nbrs full_cql_vector.yaml scenario=filtered_knn limit=100

params:
  adapter: cql
  dataset: example
  prefix: ""
  oracles_prefix: "label_"
  keyspace: baselines
  k_values: "1,10,100"
  k_1_limits: "1,2,4,8,16,32,64"
  k_10_limits: "10,20,30,40,50"
  k_100_limits: "100,200,300,400,500"
  concurrency: "100"
  query_concurrency: "20"
  replication: "{'class': 'SimpleStrategy', 'replication_factor': '1'}"
  fknn_profile: default
#  optimize_for_values: "RECALL"
  optimize_for_values: "RECALL,LATENCY"
  vector_idx_suffix: _vector_idx
  meta_idx_suffix: _meta_idx

# Unified report block (SRD-46): plots + tables in declaration
# order. Each scenario contributes its items to its own
# scenario-specific markdown file so the post-run reports stay
# scoped to the data they describe.
#
# Scenarios:
#   - `test_oracles` → ANN/recall sweep, emits recall@N metrics
#     under the `ann_query` phase.
#   - `test_fknn`    → filtered-KNN sweep, emits recall metrics
#     under the `pvs_query` phase.
#
# A `Run Details` block is auto-prepended to each markdown
# file by the runtime — no need to declare it here.

# Surface recall-family aggregates and latency on the inline
# progress line and per-phase ✓ DONE summary. Doc-root setting
# is inherited by every phase that doesn't declare its own
# `status_metrics:`. Glob patterns: `recall*` matches the
# `recall` family (with `k`/`r` labels carrying the cutoff)
# from the relevancy block; `latency*` matches the
# `latency_p50` / `latency_p99` / `latency_max` /
# `latency_mean` family sourced from the service-time histogram.
status_metrics: [recall*, latency*]

report:
  defaults:
    palette: wong

  oracles_section: |
    file oracles_report.md as 'ANN Recall Sweep'

    text 
     This report covers the **test_oracles** scenario: per-
     profile partition tests that sweep `k` and `limit` against
     a SAI-indexed vector column. Recall is measured against the
     ground truth provided by the dataset's test set.

     Figures below show the per-profile and aggregate recall@k
     curves; the table summarises mean recall by profile.

    table recall_oracles
      group_by: profile
      query recall: avg(recall_mean{k="10"}) by (profile,limit)
      query latency: avg(cycles_servicetime_mean) by (profile,limit)

    plot recall_1_mean
      label "ALL 1-recall@R, oracles & PVS"
      legend: br
      x: r
      x-legend: "R"
      x-ticks: avg(recall_mean{k="1",profile=~"label.*"}) by (k,r)
      y1: avg(recall_mean{k="1",phase="ann_query",profile=~"label.*"}) by (k,r,optimize_for)
      y2: avg(recall_mean{k="1",phase="pvs_query",profile=~"default"}) by (k,r,optimize_for)
      y3: avg(overscan{k="1",phase="ann_query",profile=~"label.*"}) by (k,r)
      y-legends: ["oracle-O4[optimize_for]", "PVS_O4[optimize_for]", overscan]
      y-ranges: [[0.0,1.0]]
      y-labels:  [recall, overscan]
      with-table: true
      style profile=default:line=dotted

    plot recall_10_mean
      label "ALL 10-recall@R, oracles & PVS"
      legend: br
      x: r
      x-legend: "R"
      x-ticks: avg(recall_mean{k="10",profile=~"label.*"}) by (k,r)
      y1: avg(recall_mean{k="10",phase="ann_query",profile=~"label.*"}) by (k,r,optimize_for)
      y2: avg(recall_mean{k="10",phase="pvs_query",profile=~"default"}) by (k,r,optimize_for)
      y3: avg(overscan{k="10",phase="ann_query",profile=~"label.*"}) by (k,r)
      y-legends: ["oracle-O4[optimize_for]", "PVS_O4[optimize_for]", overscan]
      y-ranges: [[0.0,1.0]]
      y-labels:  [recall, overscan]
      with-table: true
      style profile=default:line=dotted

    plot recall_100_mean
      label "ALL 100-recall@R, oracles & PVS"
      legend: br
      x: r
      x-legend: "R"
      x-ticks: avg(recall_mean{k="100",profile=~"label.*"}) by (k,r,optimize_for)
      y1: avg(recall_mean{k="100",phase="ann_query",profile=~"label.*"}) by (k,r,optimize_for)
      y2: avg(recall_mean{k="100",phase="pvs_query",profile=~"default"}) by (k,r,optimize_for)
      y3: avg(overscan{k="100",phase="ann_query",profile=~"label.*"}) by (k,r)
      y-legends: ["oracle-O4[optimize_for]", "PVS_O4[optimize_for]", overscan]
      y-ranges: [[0.0,1.0]]
      y-labels:  [recall, overscan]
      with-table: true
      style profile=default:line=dotted

    plot recall_vs_latency_k1
      label "Recall@1 vs latency, oracles & PVS"
      legend: br
      x: cycles_servicetime_mean
      x-legend: "service time"
      y1: avg(recall_mean{k="1",phase="ann_query",profile=~"label.*"}) by (k,r,optimize_for)
      y2: avg(recall_mean{k="1",phase="pvs_query",profile=~"default"}) by (k,r,optimize_for)
      y-legends: ["oracle-O4[optimize_for]", "PVS_O4[optimize_for]"]
      y-ranges: [[0.0,1.0]]
      y-labels:  [recall]
      with-table: true
      style profile=default:line=dotted



