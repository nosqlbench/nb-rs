#!/usr/bin/env nbrs
# CQL Vector Search — Multi-Profile Discovery
#
# Generic phases parameterized by {table}, {dataset}, and {profile}.
# Scenario trees set {profile} (and sometimes {table}) via for
# iteration variables. Dataset-facing calls use the canonical
# "{dataset}:{profile}" composite inline format.
#
# Usage:
#   nbrs full_cql_vector.yaml scenario=fulltest
#   nbrs full_cql_vector.yaml scenario=filtered_knn
#   nbrs full_cql_vector.yaml scenario=unfiltered
#   nbrs full_cql_vector.yaml scenario=filtered_knn limit=100

params:
  adapter: cql
  dataset: example
  prefix: ""
  oracles_prefix: "label_"
  keyspace: baselines
  k_values: "1,10,100"
  k_1_limits: "1,2,4,8,16,32,64"
  k_10_limits: "10,20,30,40,50"
  k_100_limits: "100,200,300,400,500"
  concurrency: "100"
  query_concurrency: "20"
  replication: "{'class': 'SimpleStrategy', 'replication_factor': '1'}"
  fknn_profile: default
#  optimize_for_values: "recall"
  optimize_for_values: "recall,latency"
  vector_idx_suffix: _vector_idx
  meta_idx_suffix: _meta_idx

# Unified report block (SRD-46): plots + tables in declaration
# order. Each scenario contributes its items to its own
# scenario-specific markdown file so the post-run reports stay
# scoped to the data they describe.
#
# Scenarios:
#   - `test_oracles` → ANN/recall sweep, emits recall@N metrics
#     under the `ann_query` phase.
#   - `test_fknn`    → filtered-KNN sweep, emits recall metrics
#     under the `pvs_query` phase.
#
# A `Run Details` block is auto-prepended to each markdown
# file by the runtime — no need to declare it here.

# Surface recall-family aggregates and latency on the inline
# progress line and per-phase ✓ DONE summary. Doc-root setting
# is inherited by every phase that doesn't declare its own
# `status_metrics:`. Glob patterns: `recall*` matches the
# `recall` family (with `k`/`r` labels carrying the cutoff)
# from the relevancy block; `latency*` matches the
# `latency_p50` / `latency_p99` / `latency_max` /
# `latency_mean` family sourced from the service-time histogram.
status_metrics: [recall*, latency*]

report:
  defaults:
    palette: wong

  oracles_section: |
    file oracles_report.md as 'ANN Recall Sweep'

    text 
     This report covers the **test_oracles** scenario: per-
     profile partition tests that sweep `k` and `limit` against
     a SAI-indexed vector column. Recall is measured against the
     ground truth provided by the dataset's test set.

     Figures below show the per-profile and aggregate recall@k
     curves; the table summarises mean recall by profile.

    table recall_oracles
      group_by: profile
      query recall: avg(recall_mean{k="10"}) by (profile,limit)
      query latency: avg(cycles_servicetime_mean) by (profile,limit)

    plot recall_1_mean
      label "ALL 1-recall@R, oracles & PVS"
      legend: br
      x: r
      x-legend: "R"
      x-ticks: avg(recall_mean{k="1",profile=~"label.*"}) by (k,r)
      y-side: left
      y1: avg(recall_mean{k="1",phase="ann_query",profile=~"label.*"}) by (k,r,optimize_for)
      y2: avg(recall_mean{k="1",phase="pvs_query",profile=~"default"}) by (k,r,optimize_for)
      y-legends: ["oracle-O4[optimize_for]", "PVS_O4[optimize_for]"]
      y-ranges: [[0.0,1.0],[0.0,1.0]]
      y-labels: ["oracle-O4[optimize_for]", "PVS_O4[optimize_for]"]
      with-tables: [optimize_for]
      style profile=default:line=dotted

    plot recall_10_mean
      label "ALL 10-recall@R, oracles & PVS"
      legend: br
      x: r
      x-legend: "R"
      x-ticks: avg(recall_mean{k="10",profile=~"label.*"}) by (k,r)
      y-side: left
      y1: avg(recall_mean{k="10",phase="ann_query",profile=~"label.*"}) by (k,r,optimize_for)
      y2: avg(recall_mean{k="10",phase="pvs_query",profile=~"default"}) by (k,r,optimize_for)
      y-legends: ["oracle-O4[optimize_for]", "PVS_O4[optimize_for]"]
      y-ranges: [[0.8,1.0],[0.8,1.0]]
      y-labels: ["oracle-O4[optimize_for]", "PVS_O4[optimize_for]"]
      with-tables: [optimize_for]
      style profile=default:line=dotted

    plot recall_10_mean_all
      label "ALL 10-recall@R, oracles & PVS ALL"
      legend: br
      x: r
      x-legend: "R"
      x-ticks: recall_mean{k="10",profile=~"label.*"} by (k,r)
      y-side: left
      y1: recall_mean{k="10",phase="ann_query",profile=~"label.*"} by (k,r,optimize_for)
      y2: recall_mean{k="10",phase="pvs_query",profile=~"default"} by (k,r,optimize_for)
      y-legends: ["oracle-O4[optimize_for]", "PVS_O4[optimize_for]"]
      y-ranges: [[0.8,1.0],[0.8,1.0]]
      y-labels: ["oracle-O4[optimize_for]-all", "PVS_O4[optimize_for]-all"]
      with-tables: [optimize_for_all]
      style profile=default:line=dotted

    plot recall_100_mean
      label "ALL 100-recall@R, oracles & PVS"
      legend: br
      x: r
      x-legend: "R"
      x-ticks: avg(recall_mean{k="100",profile=~"label.*"}) by (k,r,optimize_for)
      y-side: left
      y1: avg(recall_mean{k="100",phase="ann_query",profile=~"label.*"}) by (k,r,optimize_for)
      y2: avg(recall_mean{k="100",phase="pvs_query",profile=~"default"}) by (k,r,optimize_for)
      y-legends: ["oracle-O4[optimize_for]", "PVS_O4[optimize_for]"]
      y-ranges: [[0.9,1.0],[0.9,1.0]]
      y-labels:  ["oracle-o4[optimize_for], "PVS_O4[optimize_for]"]
      with-tables: [optimize_for]
      style profile=default:line=dotted

    plot recall_vs_latency_k1
      label "Recall@1 vs latency, oracles & PVS"
      legend: br
      x: r
      x-legend: "service time"
      y1: avg(cycles_servicetime_mean{k="1",phase="ann_query",profile=~"label.*"}) by (k,r,optimize_for)
      y2: avg(cycles_servicetime_mean{k="1",phase="pvs_query",profile=~"default"}) by (k,r,optimize_for)
      y-legends: ["oracle-O4[optimize_for]", "PVS_O4[optimize_for]"]
      y-ranges: [[0.0,1.0],[0.0,1.0]]
      y-labels:  [recall]
      with-tables: [optimize_for]
      style profile=default:line=dotted

bindings: |
  profiles := matching_profiles("{dataset}", "{prefix}")
  # SRD-66: detected-fact wires populated by the
  # `detect_dialect` phase. Initial `false`; the result-
  # bindings on `describe_system_views` flip them based on
  # the cluster's schema. `await_index` reads them via
  # `pick(...)` to choose the right system-views table.
  shared has_sai_column_indexes := false
  shared has_indexes := false

scenarios:

  # `default` runs when the operator invokes without an
  # explicit `scenario=`. Aliases `fulltest` so the natural
  # `nbrs run workload=full_cql_vector.yaml dryrun=…` invocation
  # exercises a coherent scenario tree (with the for-loops
  # that bind `{profile}` / `{table}` / `{optimize_for}`),
  # not the runtime-auto-generated flat phase list (which
  # invokes every phase at the top level without those
  # iteration variables and immediately fails to resolve
  # `{table}` in the schema phase).
  default:
    - scenario: fulltest

  fulltest:
    - detect_dialect
    - scenario: test_oracles
    - scenario: test_fknn
    # One-shot diagnostic probe — runs the SAME query
    # against both oracle and PVS tables and dumps
    # bindings + DB result bodies to <session>/audit.log.
    # Both tables must already exist; placement after
    # test_fknn guarantees that.
    - recall_audit_oracle
    - recall_audit_pvs

  # Standalone diagnostic scenario — invoke with
  # `scenario=recall_audit_only` to run JUST the probe
  # against leftover tables from a previous fulltest run.
  # Skips teardown / schema / rampup / await_index, so
  # the existing data is used as-is. Errors out if the
  # tables `vec_label_00_recall` or `fknn_default_recall`
  # don't exist; run `fulltest` first to populate them.
  recall_audit_only:
    - recall_audit_oracle
    - recall_audit_pvs

  # Probe-only: detect dialect and count the SAI index's
  # SSTable fan-out for label_00:recall. Confirms whether
  # the SAI-not-settled hypothesis is the cause of the
  # recall inversion before we wire in the full compaction
  # pipeline.
  count_only:
    - detect_dialect
    - for: "profile in matching_profiles('{dataset}', '{oracles_prefix}')"
      phases:
        - for: "optimize_for in {optimize_for_values}, table in vec_{profile}_{optimize_for}"
          phases:
            - count_sstables

  # Per-profile partition test (label_00..label_11)
  test_oracles:
    - detect_dialect
    - for: "profile in matching_profiles('{dataset}', '{oracles_prefix}')"
      phases:
        - for: "optimize_for in {optimize_for_values}, table in vec_{profile}_{optimize_for}"
          phases:
            - teardown
            - schema
            - rampup
            - await_index
            # SAI's `is_building=true` flag flips false long
            # before the index has been compacted down to a
            # single SSTable. Recall at narrow LIMIT is
            # measurably worse on a fragmented SAI index
            # (we lost ~11 points in earlier runs that
            # measured pre-compaction). Force the SAI index
            # to its settled state via Jolokia → flush →
            # major compaction, then verify via BOTH paths:
            # Jolokia (CompactionManager.getCompactions ==
            # []) for "no jobs running" and CQL
            # (sai_sstable_indexes count == 1) for "the
            # index actually merged".
            - count_sstables
            - jolokia_flush
            - jolokia_compact
            - jolokia_await_compaction
            - await_compaction
            - count_sstables
            - for: "k in {k_values}, limit in {k_{k}_limits}"
              phases:
                - ann_query

  # Query-only oracle scenario — same parameter sweep as
  # `test_oracles` but skips teardown/schema/rampup/await_index.
  # Use against tables already populated by a prior `test_oracles`
  # run to measure recall as the SAI index ages without
  # re-paying the rampup cost. If recall here climbs over
  # repeated invocations, the SAI index hasn't fully settled by
  # the time `await_index`'s polling returns.
  test_oracles_query_only:
    - detect_dialect
    - for: "profile in matching_profiles('{dataset}', '{oracles_prefix}')"
      phases:
        - for: "optimize_for in {optimize_for_values}, table in vec_{profile}_{optimize_for}"
          phases:
            - for: "k in {k_values}, limit in {k_{k}_limits}"
              phases:
                - ann_query

  # Filtered KNN against default profile
  # For smoke testing: nbrs full_cql_vector.yaml filtered_knn limit=100
  #
  # Rampup and query are interleaved inside the SAME for-loop
  # iteration over `optimize_for` so each iteration's queries hit
  # the index that was just built. The previous shape (separate
  # `rampup_fknn` and `query_fknn` top-level scenarios) caused the
  # second rampup iteration to tear down and rebuild the table
  # under a different `optimize_for` setting before the first
  # iteration's queries could run; both query iterations then
  # measured the SAME (last-built) index, producing byte-identical
  # `optimize_for=LATENCY` and `optimize_for=RECALL` recall values
  # that differed only in their metric labels. Mirrors the
  # `test_oracles` shape.
  test_fknn:
    - detect_dialect
    - for: "profile in {fknn_profile}, optimize_for in {optimize_for_values}, table in fknn_{profile}_{optimize_for}"
      phases:
        - teardown
        - schema
        - fknn_rampup_data
        - await_index
        # Same SAI-settlement guard as test_oracles — see
        # comment there. Jolokia drives the flush + compact
        # triggers AND the "no compaction jobs running"
        # check; CQL polls `sai_sstable_indexes` for the
        # final `count == 1` settled state.
        - count_sstables
        - jolokia_flush
        - jolokia_compact
        - jolokia_await_compaction
        - await_compaction
        - count_sstables
        - for: "k in {k_values}, limit in {k_{k}_limits}"
          phases:
            - pvs_query

  await_fknn:
    - detect_dialect
    - for: "profile in {fknn_profile}, table in fknn_{profile}, optimize_for in {optimize_for_values}"
      phases:
        - await_index



# =====================================================================
# Generic Phases — parameterized by {table}, {dataset}, and {profile}
# =====================================================================

phases:

  # ── Schema DDL (parameterized by {table}, {dataset}:{profile}, {optimize_for}) ──
  # Single unified schema: keyspace → table (with metadata column) → indexes.
  # All IF NOT EXISTS — idempotent and safe to re-run.
  # ANN-only workloads simply leave the metadata column null.

  schema:
    concurrency: 1
    bindings: |
      dim := vector_dim("{dataset}:{profile}")
      similarity_function := dataset_distance_function("{dataset}:{profile}")
    ops:
      create_keyspace:
        raw: |
          CREATE KEYSPACE IF NOT EXISTS {keyspace} 
          WITH replication = {replication} AND durable_writes = true
      create_table:
        raw: |
          CREATE TABLE IF NOT EXISTS {keyspace}.{table} 
          (key text PRIMARY KEY, value vector<float, {dim}>, metadata int)
          WITH
           compaction = {
           'class': 'SizeTieredCompactionStrategy', 
           'min_threshold': '2', 
           'max_threshold': '5' }
          AND compression = {
           'enabled': 'false'
          }

      create_vector_index:
        raw: |
          CREATE CUSTOM INDEX IF NOT EXISTS {table}{vector_idx_suffix}
          ON {keyspace}.{table} (value)
          USING 'StorageAttachedIndex'
          WITH OPTIONS = {'optimize_for': '{optimize_for}', 'similarity_function': '{similarity_function}'}
      create_metadata_index:
        raw: |
          CREATE CUSTOM INDEX IF NOT EXISTS {table}{meta_idx_suffix}
          ON {keyspace}.{table} (metadata) USING 'StorageAttachedIndex'

  # Anti-DDL: tear down in reverse order (indexes → table).
  # Keyspace left intact (shared across tests).
  teardown:
    concurrency: 1
    ops:
      drop_metadata_index:
        raw: "DROP INDEX IF EXISTS {keyspace}.{table}{meta_idx_suffix}"
      drop_vector_index:
        raw: "DROP INDEX IF EXISTS {keyspace}.{table}{vector_idx_suffix}"
      drop_table:
        raw: "DROP TABLE IF EXISTS {keyspace}.{table}"

  # SRD-66 probe phase: runs once per scenario, before
  # any phase that consumes the dialect facts. Reads the
  # cluster's `system_views` schema and flips the
  # workload-root `shared` booleans based on which
  # virtual table is present. Result-bindings use
  # `regex_match(exactly_one_value(body), …)` to assert
  # the schema-text body is unary and apply the pattern.
  # Subsequent phases read the booleans via `extern` and
  # branch with `pick(...)` to choose the right system
  # table.
  detect_dialect:
    concurrency: 1
    cycles: 1
    ops:
      describe_system_views:
        raw: "DESCRIBE KEYSPACE system_views"
        result: |
          # `DESCRIBE KEYSPACE` returns multi-row. Flatten the
          # JSON leaves (including embedded newlines inside
          # `create_statement` columns) into one big text the
          # regex can scan. CQL emits `CREATE TABLE …` and
          # `CREATE VIRTUAL TABLE …`, so the pattern allows
          # the optional CREATE prefix.
          schema_text            := log_info("JSON_TEXT: " + json_text(body))
          has_sai_column_indexes := log_info(regex_match(schema_text, "(?im)^\s*(?:CREATE\s+)?(?:VIRTUAL\s+)?TABLE\s+system_views\.sai_column_indexes\s*\("))
          has_indexes            := log_info(regex_match(schema_text, "(?im)^\s*(?:CREATE\s+)?(?:VIRTUAL\s+)?TABLE\s+system_views\.indexes\s*\("))

  # Count the SSTables that the vector SAI index currently
  # spans for `{keyspace}.{table}`. Each row in
  # `system_views.sai_sstable_indexes` is one (keyspace,
  # index, sstable) tuple, so `COUNT(*)` filtered to our
  # index gives the live SSTable fan-out. SAI's ANN graph
  # quality degrades with sstable count > 1 — count > 1
  # post-rampup means the search has to query multiple
  # graphs and merge, which lowers recall at narrow LIMIT
  # values. Surfaces the number as both an audit.log line
  # and a `sai_sstable_count` gauge so we can plot it over
  # time.
  count_sstables:
    concurrency: 1
    cycles: 1
    ops:
      sai_sstable_count:
        raw: |
          SELECT sstable_name FROM system_views.sai_sstable_indexes
          WHERE keyspace_name = '{keyspace}'
            AND index_name = '{table}{vector_idx_suffix}'
          ALLOW FILTERING
        # SRD-66 magic extern `count` is populated by the
        # adapter wrapper with the result body's row count
        # (typed as u64), so we don't need
        # `exactly_one_value` extraction here — every row
        # returned is one SSTable in the SAI index.
        # Split the format_u64 call into its own binding so
        # the `+`-as-str_concat dispatch sees a clean
        # `Str + Str` (rather than re-inferring the nested
        # call's return type).
        # No `metrics:` block — see followup note: the
        # current wrapper order (result innermost, metrics
        # outermost) means `metrics` reads its values from
        # the per-op kernel BEFORE the result-binding
        # captures have been written there, so a `value:
        # count` gauge resolves to Value::None at cycle
        # time. Audit log line is the visibility path for
        # now.
        result: |
          n_str := format_u64(count, 10)
          _audit := log_info("sai_sstable_count: " + n_str)

  # Trigger a memtable flush for {keyspace} via the Jolokia
  # JMX/HTTP bridge. Cassandra's `is_building=true → false`
  # signal (used by `await_index`) fires before the data has
  # been pushed to disk; until a flush happens, the SAI index
  # lives entirely in the memtable and `sai_sstable_indexes`
  # returns zero rows. Running this between rampup and the
  # query phases guarantees there's at least one on-disk
  # SSTable for the SAI index to anchor on, so the subsequent
  # `await_compaction` poll on `count == 1` actually sees the
  # state it's waiting for.
  #
  # MBean: org.apache.cassandra.db:type=StorageService
  # Operation:
  #   forceKeyspaceFlush(String keyspaceName, String[] tableNames)
  #
  # This Cassandra build requires the two-arg signature
  # (`String, String[]`); the GET-URL form can't express the
  # array argument cleanly, so we POST a JSON exec envelope
  # with an empty `[]` tables list (= flush the entire
  # keyspace).
  #
  # Jolokia ALWAYS returns HTTP 200 — the JMX call's outcome
  # lives in the response body's `status` field. The verify
  # block below asserts `status == 200` so a JMX-side error
  # (mistyped keyspace, missing MBean, permission failure)
  # surfaces as a phase error instead of being silently
  # swallowed.
  jolokia_flush:
    adapter: http
    concurrency: 1
    cycles: 1
    ops:
      flush:
        uri: "http://localhost:8778/jolokia/"
        method: POST
        body: |
          {"type":"exec",
           "mbean":"org.apache.cassandra.db:type=StorageService",
           "operation":"forceKeyspaceFlush(java.lang.String,[Ljava.lang.String;)",
           "arguments":["{keyspace}",[]]}
        verify:
          - field: status
            eq: "200"
        strict: true
        memo:
          before: "flushing keyspace {keyspace}"
          after:  "flushed keyspace {keyspace}"

  # Trigger a major compaction for {keyspace}.{table} via
  # Jolokia. After a flush, multiple SSTables typically exist
  # (one per flushed memtable + any prior segments). The
  # compaction merges them into a single SSTable, which is
  # the steady-state condition `await_compaction` polls for.
  #
  # MBean: org.apache.cassandra.db:type=StorageService
  # Operation:
  #   forceKeyspaceCompaction(boolean splitOutput,
  #                           String keyspaceName,
  #                           String... tableNames)
  # `splitOutput=false` keeps the output as a single SSTable
  # (the whole point of running this).
  #
  # `forceKeyspaceCompaction` is SYNCHRONOUS — the JMX call
  # blocks until the compaction completes. For a 1M-vector
  # table the call can take 20-30 minutes; `timeout_ms` is
  # set high enough to cover that without tripping the
  # adapter's default 30-second client timeout.
  #
  # Same Jolokia 200-in-body assertion as `jolokia_flush` —
  # don't fire and forget. The verify block ensures a JMX
  # failure (after the long wait) still fails the phase.
  jolokia_compact:
    adapter: http
    concurrency: 1
    cycles: 1
    ops:
      compact:
        uri: "http://localhost:8778/jolokia/"
        method: POST
        body: |
          {"type":"exec",
           "mbean":"org.apache.cassandra.db:type=StorageService",
           "operation":"forceKeyspaceCompaction(boolean,java.lang.String,[Ljava.lang.String;)",
           "arguments":[false,"{keyspace}",["{table}"]]}
        request_timeout_ms: 3600000
        verify:
          - field: status
            eq: "200"
        strict: true
        memo:
          before: "compacting {keyspace}.{table}"
          after:  "compacted {keyspace}.{table}"

  # Poll Jolokia until Cassandra's CompactionManager reports
  # no running compactions. The state lives on the JMX
  # ATTRIBUTE `Compactions` (read-only list of currently-
  # active compaction tasks), NOT an op like `getCompactions`
  # which this Cassandra build doesn't expose. Jolokia
  # wraps the attribute value in `{value: [...], status: 200,
  # ...}`, so the poll uses `json_path: /value` to drill into
  # the array and `await_empty` semantics (default
  # `min_rows=0, max_rows=0`) to wait until the list is
  # empty.
  #
  # Each poll iteration is a short HTTP call — the *loop*
  # is the long-running step. If a new compaction kicks off
  # mid-poll (size-tier triggered by an earlier compaction's
  # output, or a SAI side-effect of the base-table compact),
  # the array becomes non-empty again and the loop keeps
  # waiting. `request_timeout_ms: 10000` caps a single HTTP
  # call (slow JMX, GC pause) so we fail fast and resume on
  # the next interval; `poll.timeout_ms` is the overall
  # loop deadline.
  #
  # Same `status == 200` verify as the trigger phases so a
  # JMX-side failure surfaces as a phase error instead of
  # being silently swallowed.
  jolokia_await_compaction:
    adapter: http
    concurrency: 1
    ops:
      compactions_running:
        memo:
          before: "awaiting compaction on {keyspace}.{table}"
          after: "compacted {keyspace}.{table}"
        uri: "http://localhost:8778/jolokia/read/org.apache.cassandra.db:type=CompactionManager/Compactions"
        method: GET
        request_timeout_ms: 10000
        verify:
          - field: status
            eq: "200"
        strict: true
        poll:
          mode: await_empty
          interval_ms: 5000
          timeout_ms: 1800000
          max_error_retries: 3
          json_path: "/value"
          metric_name: jolokia_compaction_wait_time_s

  # Block until the SAI vector index has been compacted
  # down to a single SSTable. Polls
  # `system_views.sai_sstable_indexes` rows for our index
  # and waits until the row count is exactly 1.
  #
  # `min_rows=1` is load-bearing: right after rampup the
  # data is still in the memtable and zero rows appear
  # in `sai_sstable_indexes`. Without the lower bound, the
  # poll exits immediately at count=0 — before the
  # memtable has flushed — and recall is measured on an
  # un-settled state. With `[1..=1]` the poll waits for
  # (a) flush so there's at least 1 sstable, then
  # (b) compaction so there's at most 1.
  #
  # Trusts natural compaction to converge. If the cluster
  # doesn't reach `count == 1` within `timeout_ms`, the
  # phase fails with a poll timeout, which is the correct
  # surfacing for an unsettling-cluster condition.
  await_compaction:
    concurrency: 1
    ops:
      sai_sstable_count_settled:
        raw: |
          SELECT sstable_name FROM system_views.sai_sstable_indexes
          WHERE keyspace_name = '{keyspace}'
            AND index_name = '{table}{vector_idx_suffix}'
          ALLOW FILTERING
        poll:
          mode: await_settled
          interval_ms: 5000
          timeout_ms: 1800000
          min_rows: 1
          max_rows: 1
          max_error_retries: 3
          metric_name: compaction_wait_time_s

  await_index:
    concurrency: 1
    bindings: |
      # SRD-66 §"Surface 3" — `pick(b0, b1, v0, v1)`
      # returns the value paired with the unique true
      # selector. Exactly one of the two booleans must
      # be true (the detect_dialect phase guarantees
      # this); zero or two true selectors is a hard
      # error pointing the operator at a misconfigured
      # cluster.
      target_index_table := pick(
        has_sai_column_indexes, has_indexes,
        "system_views.sai_column_indexes",
        "system_views.indexes")
    ops:
      indexes_present:
        raw: |
          SELECT index_name FROM {target_index_table}
          WHERE keyspace_name = '{keyspace}'
            AND index_name = '{table}{vector_idx_suffix}'
          ALLOW FILTERING
        verify:
          - min_rows: 1
        strict: true
      indexes_built:
        raw: |
          SELECT index_name FROM {target_index_table}
          WHERE keyspace_name = '{keyspace}'
            AND index_name = '{table}{vector_idx_suffix}'
            AND is_building = true
          ALLOW FILTERING
        poll:
          mode: await_empty
          interval_ms: 5000
          timeout_ms: 600000
          max_error_retries: 3
          metric_name: index_build_time_s

  # ── Data loading (parameterized by {table}, {dataset}:{profile}) ────────────
  # ANN rampup: key + vector only. Used by fulltest, unfiltered.

  rampup:
    concurrency: "{concurrency}"
    bindings: |
      init prebuffered = dataset_prebuffer("{dataset}:{profile}")
      cursor row = range(0, vector_count(prebuffered))
      id := format_u64(row, 10)
      train_vector := vector_at(prebuffered, row)
    ops:
      insert:
        max_batch_size: 64KB
        batchtype: unlogged
        prepared: |
          INSERT INTO {keyspace}.{table} 
                 ( key,    value) 
          VALUES ( '{id}', {train_vector})
  # Filtered-KNN rampup: includes metadata column for predicate filtering
  fknn_rampup_data:
    concurrency: "{concurrency}"
    bindings: |
      init prebuffered = dataset_prebuffer("{dataset}:{profile}")
      cursor row = range(0, vector_count(prebuffered))
      id := format_u64(row, 10)
      train_vector := vector_at(prebuffered, row)
      meta := metadata_value_at(prebuffered, row)
    ops:
      insert:
        max_batch_size: 64KB
        batchtype: unlogged
        prepared: |
          INSERT INTO {keyspace}.{table} 
          (  key,    value,          metadata) VALUES 
          (  '{id}', {train_vector}, {meta})

  # ── Search (parameterized by {table}, {dataset}:{profile}, {k}) ────────────

  ann_query:
    concurrency: "{query_concurrency}"
    bindings: |
      init prebuffered = dataset_prebuffer("{dataset}:{profile}")
      init query_counts = query_count(prebuffered)
      cursor q = range(0, query_counts * 1)
      query_vector := query_vector_at(prebuffered, q % query_counts)
      ground_truth := neighbor_indices_at(prebuffered, q)
      latency_factor := 0.979 + 4.021 * pow(limit, -0.761)                                                                                                                                                                                                             
      recall_factor  := 0.509 + 9.491 * pow(limit, -0.402)
      overscan := if(optimize_for == "LATENCY", latency_factor, recall_factor) 

    ops:
      select_ann:
        prepared: |
          SELECT key FROM {keyspace}.{table} 
          ORDER BY value
          ANN OF {query_vector} 
          LIMIT {limit}
        evaluations:
          relevancy:
            actual: key
            expected: "{ground_truth}"
            k: "{k}"
            r: "{limit}"
            functions:
              - recall
        metrics:
          overscan:
            kind: gauge
            value: overscan


  # Single-cycle diagnostic phase. Runs the SAME query
  # vector against both the oracle (label_00) and PVS
  # (default WHERE metadata=0) paths, dumps the bindings
  # + result bodies via log_info, so audit.log shows:
  #
  #   - the query vector hash (proxy for "this is the
  #     same q across both probes"),
  #   - oracle's ground truth (label_00 local indices),
  #     oracle's DB result keys,
  #   - the corresponding default-side payload (PVS
  #     ground truth at default's q=0, predicate, and DB
  #     keys returned).
  #
  # The user reads audit.log to cross-check whether the
  # DB returns the same effective vectors on both paths
  # (compare returned values when extracted via
  # `SELECT key,value`).
  #
  # Hardcoded to label_00 / metadata=0. Requires the
  # `fulltest` scenario to have already populated both
  # tables; runs once after test_fknn so both targets
  # exist.
  # Single-op phase: oracle path only, iterates q=0..856
  # (all label_00 queries). Pairs with `recall_audit_pvs`
  # below; both phases iterate the SAME q range so the
  # offline analyser can join their audit.log entries by q
  # and compute per-q recall deltas (oracle vs pvs on the
  # identical query vector).
  recall_audit_oracle:
    concurrency: 1
    bindings: |
      init opb = dataset_prebuffer("{dataset}:label_00")
      cursor q = range(0, 856)
      query           := query_vector_at(opb, q)
      gt_oracle       := neighbor_indices_at(opb, q)
      _audit_marker   := log_info("=== recall_audit_oracle cycle: label_00 q=" + format_u64(q, 10) + " ===")
      _audit_gt       := log_info("gt_oracle (label_00 local indices, top-100): " + json_text(gt_oracle))
    ops:
      oracle_probe:
        prepared: |
          SELECT key, value FROM {keyspace}.vec_label_00_recall
          ORDER BY value ANN OF {query} LIMIT 10
        result: |
          _audit_oracle_result := log_info("oracle_probe body: " + json_text(body))

  # Single-op phase: PVS path only, iterates q=0..856 (same
  # range as recall_audit_oracle). Uses label_00's query
  # vectors so each q corresponds to the SAME underlying
  # query as the oracle phase's same-q cycle.
  recall_audit_pvs:
    concurrency: 1
    bindings: |
      init opb = dataset_prebuffer("{dataset}:label_00")
      cursor q = range(0, 856)
      query           := query_vector_at(opb, q)
      gt_oracle       := neighbor_indices_at(opb, q)
      _audit_marker   := log_info("=== recall_audit_pvs cycle: label_00 q=" + format_u64(q, 10) + " ===")
      _audit_gt       := log_info("gt_oracle (label_00 local indices, top-100): " + json_text(gt_oracle))
    ops:
      pvs_probe:
        prepared: |
          SELECT key, value FROM {keyspace}.fknn_default_recall
          WHERE metadata = 0
          ORDER BY value ANN OF {query} LIMIT 10
        result: |
          _audit_pvs_result := log_info("pvs_probe body: " + json_text(body))

  pvs_metadata_query:
    concurrency: "{query_concurrency}"
    errors: count
    bindings: |
      init prebuffered = dataset_prebuffer("{dataset}:{profile}")
      init query_counts = query_count(prebuffered)
      cursor q = range(0, query_counts * 1)          
      predicate := predicate_value_at(prebuffered, q % query_counts)
    ops:
      select_ann:
        # LIMIT {limit} (search depth) rather than LIMIT {k}
        # (recall cutoff). With a server that *post-filters* SAI
        # ANN+WHERE, the wider candidate set lets a larger
        # fraction of true neighbours survive the metadata
        # predicate; with a server that *pre-filters*, the LIMIT
        # is irrelevant to recall and this match the standard
        # "search depth ≥ k" recall-measurement convention. The
        # relevancy below truncates back to k via `r=limit`.
        prepared: |
          SELECT key FROM {keyspace}.{table}
          WHERE metadata = {predicate}
          LIMIT {limit}

  pvs_query:
    concurrency: "{query_concurrency}"
    errors: count
    bindings: |
      init prebuffered = dataset_prebuffer("{dataset}:{profile}")
      init query_counts = query_count(prebuffered)
      cursor q = range(0, query_counts * 1)
      query_vector := query_vector_at(prebuffered, q % query_counts)
      predicate := predicate_value_at(prebuffered, q % query_counts)
      ground_truth := filtered_neighbor_indices_at(prebuffered, q % query_counts)
      latency_factor := 0.979 + 4.021 * pow(limit, -0.761)
      recall_factor  := 0.509 + 9.491 * pow(limit, -0.402)
      # Align with ann_query's overscan formula. A future
      # `map(key, "K1", v1, "K2", v2, ...)` intrinsic could
      # replace this once designed; for now `if(... == "LATENCY",
      # ..., ...)` is the canonical dispatch on string keys.
      overscan := if(optimize_for == "LATENCY", latency_factor, recall_factor)

    ops:
      select_ann:
        # LIMIT {limit} (search depth) rather than LIMIT {k}
        # (recall cutoff). With a server that *post-filters* SAI
        # ANN+WHERE, the wider candidate set lets a larger
        # fraction of true neighbours survive the metadata
        # predicate; with a server that *pre-filters*, the LIMIT
        # is irrelevant to recall and this match the standard
        # "search depth ≥ k" recall-measurement convention. The
        # relevancy below truncates back to k via `r=limit`.
        prepared: |
          SELECT key,value FROM {keyspace}.{table}
          WHERE metadata = {predicate}
          ORDER BY value
          ANN OF {query_vector} LIMIT {limit}
        evaluations:
          relevancy:
            actual: key
            expected: "{ground_truth}"
            k: "{k}"
            r: "{limit}"
            functions:
              - recall
        metrics:
          overscan:
            kind: gauge
            value: overscan



