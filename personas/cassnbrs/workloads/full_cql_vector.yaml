#!/usr/bin/env cassnbrs
# CQL Vector Search — Multi-Profile Discovery
#
# Generic phases parameterized by {table}, {dataset}, and {profile}.
# Scenario trees set {profile} (and sometimes {table}) via for_each
# iteration variables. Dataset-facing calls use the canonical
# "{dataset}:{profile}" composite inline format.
#
# Usage:
#   cassnbrs full_cql_vector.yaml scenario=fulltest
#   cassnbrs full_cql_vector.yaml scenario=filtered_knn
#   cassnbrs full_cql_vector.yaml scenario=unfiltered
#   cassnbrs full_cql_vector.yaml scenario=filtered_knn limit=100

params:
  adapter: cql
  dataset: example
  prefix: "label"
  keyspace: baselines
  k_values: "10,100"
  concurrency: "100"
  replication: "{'class': 'SimpleStrategy', 'replication_factor': '1'}"
  fknn_profile: default
  optimize_for_values: "RECALL,LATENCY"
  optimize_for: "RECALL"

summary: "recall; mean(recall) over profile~label"

bindings: |
  profiles := matching_profiles("{dataset}", "{prefix}")

scenarios:

  # Per-profile partition test (label_00..label_11)
  fulltest:
    - discover
    - for_each: "profile in matching_profiles('{dataset}', '{prefix}')"
      phases:
        - for_each: "table in vec_{profile}, optimize_for in {optimize_for}"
          phases:
            - teardown
            - schema
            - rampup
            - for_each: "index_state in building, k in {k_values}"
              phases:
                - ann_query
#            - build_index
#            - for_each: "index_state in built, k in {k_values}"
#              phases:
#                - ann_query

  # Report-only: search existing data
  reportonly:
    - for_each: "profile in matching_profiles('{dataset}', 'label'), table in vec_{profile}, k in {k_values}"
      phases:
        - ann_query
    - for_each: "profile in {fknn_profile}, table in fknn_{profile}, k in {k_values}"
      phases:
        - pvs_query

  search_only:
    - for_each: "profile in matching_profiles('{dataset}', '{prefix}'), table in vec_{profile}, k in {k_values}"
      phases:
        - ann_query

  # Full unfiltered default profile test with optimize_for sweep.
  # Drops and recreates the index for each optimize_for setting.
  unfiltered:
    - for_each: "profile in default, table in vec_{profile}, optimize_for in {optimize_for}"
      phases:
        - teardown
        - schema
        - rampup
        - for_each: "optimize_for in {optimize_for_values}"
          phases:
            - drop_indexes
            - create_index
            - for_each: "index_state in building, k in {k_values}"
              phases:
                - ann_query
            - build_index
            - for_each: "index_state in built, k in {k_values}"
              phases:
                - ann_query

  # Filtered KNN against default profile
  # For smoke testing: cassnbrs full_cql_vector.yaml filtered_knn limit=100
  filtered_knn:
    - for_each: "profile in {fknn_profile}, table in fknn_{profile}, optimize_for in {optimize_for}"
      phases:
        - teardown
        - schema
        - fknn_rampup_data
        - for_each: "index_state in building, k in {k_values}"
          phases:
            - pvs_query
        - build_index
        - for_each: "index_state in built, k in {k_values}"
          phases:
            - pvs_query

  fknn_rampup:
    - for_each: "profile in {fknn_profile}, table in fknn_{profile}, optimize_for in {optimize_for}"
      phases:
        - teardown
        - schema
        - fknn_rampup_data
        - for_each: "k in {k_values}"
          phases:
            - pvs_query

# =====================================================================
# Generic Phases — parameterized by {table}, {dataset}, and {profile}
# =====================================================================

phases:

  # ── Discovery ──────────────────────────────────────────────────

  discover:
    adapter: stdout
    cycles: ===auto
    concurrency: 1
    ops:
      info:
        stmt: "=== {dataset}: profiles for '{prefix}': {profiles} ==="

  # ── Schema DDL (parameterized by {table}, {dataset}:{profile}, {optimize_for}) ──
  # Single unified schema: keyspace → table (with metadata column) → indexes.
  # All IF NOT EXISTS — idempotent and safe to re-run.
  # ANN-only workloads simply leave the metadata column null.

  schema:
    cycles: ===auto
    concurrency: 1
    bindings: |
      dim := vector_dim("{dataset}:{profile}")
      similarity_function := dataset_distance_function("{dataset}:{profile}")
    ops:
      create_keyspace:
        raw: "CREATE KEYSPACE IF NOT EXISTS {keyspace} WITH replication = {replication} AND durable_writes = true"
      create_table:
        raw: "CREATE TABLE IF NOT EXISTS {keyspace}.{table} (key text PRIMARY KEY, value vector<float, {dim}>, metadata int)"
      create_vector_index:
        raw: "CREATE CUSTOM INDEX IF NOT EXISTS {table}_idx ON {keyspace}.{table} (value) USING 'StorageAttachedIndex' WITH OPTIONS = {'optimize_for': '{optimize_for}', 'similarity_function': '{similarity_function}'}"
      create_metadata_index:
        raw: "CREATE CUSTOM INDEX IF NOT EXISTS {table}_meta_idx ON {keyspace}.{table} (metadata) USING 'StorageAttachedIndex'"

  # Anti-DDL: tear down in reverse order (indexes → table).
  # Keyspace left intact (shared across tests).
  teardown:
    cycles: ===auto
    concurrency: 1
    ops:
      drop_metadata_index:
        raw: "DROP INDEX IF EXISTS {keyspace}.{table}_meta_idx"
      drop_vector_index:
        raw: "DROP INDEX IF EXISTS {keyspace}.{table}_idx"
      drop_table:
        raw: "DROP TABLE IF EXISTS {keyspace}.{table}"

  # Drop indexes only (for optimize_for sweep — recreate with different settings)
  drop_indexes:
    cycles: ===auto
    concurrency: 1
    ops:
      drop_metadata_index:
        raw: "DROP INDEX IF EXISTS {keyspace}.{table}_meta_idx"
      drop_vector_index:
        raw: "DROP INDEX IF EXISTS {keyspace}.{table}_idx"

  # Recreate just the vector index (after drop_indexes in optimize_for sweep)
  create_index:
    cycles: ===auto
    concurrency: 1
    bindings: |
      similarity_function := dataset_distance_function("{dataset}:{profile}")
    ops:
      create_index:
        raw: "CREATE CUSTOM INDEX IF NOT EXISTS {table}_idx ON {keyspace}.{table} (value) USING 'StorageAttachedIndex' WITH OPTIONS = {'optimize_for': '{optimize_for}', 'similarity_function': '{similarity_function}'}"

  build_index:
    summary: true
    cycles: ===auto
    concurrency: 1
    ops:
      wait_for_index:
        raw: "SELECT index_name, is_building FROM system_views.sai_column_indexes WHERE keyspace_name = '{keyspace}' AND index_name = '{table}_idx' AND is_building = true ALLOW FILTERING"
        poll: await_empty
        poll_interval_ms: 5000
        timeout_ms: 600000
        poll_metric_name: index_build_time_s

  # ── Data loading (parameterized by {table}, {dataset}:{profile}) ────────────
  # ANN rampup: key + vector only. Used by fulltest, unfiltered.

  rampup:
    summary: true
    concurrency: "{concurrency}"
    bindings: |
      cursor row = range(0, vector_count("{dataset}:{profile}"))
      init prebuffer = dataset_prebuffer("{dataset}:{profile}")
      id := format_u64(row, 10)
      train_vector := vector_at_bytes(row, "{dataset}:{profile}")
    ops:
      insert:
        max_batch_size: 64KB
        batchtype: unlogged
        prepared: "INSERT INTO {keyspace}.{table} (key, value) VALUES ('{id}', {train_vector})"

  # Filtered-KNN rampup: includes metadata column for predicate filtering
  fknn_rampup_data:
    summary: true
    concurrency: "{concurrency}"
    bindings: |
      cursor row = range(0, vector_count("{dataset}:{profile}"))
      init prebuffer = dataset_prebuffer("{dataset}:{profile}")
      id := format_u64(row, 10)
      train_vector := vector_at_bytes(row, "{dataset}:{profile}")
      meta := metadata_value_at(row, "{dataset}:{profile}")
    ops:
      insert:
        max_batch_size: 64KB
        batchtype: unlogged
        prepared: "INSERT INTO {keyspace}.{table} (key, value, metadata) VALUES ('{id}', {train_vector}, {meta})"

  # ── Search (parameterized by {table}, {dataset}:{profile}, {k}) ────────────

  ann_query:
    summary:
      - recall
    concurrency: "{concurrency}"
    bindings: |
      cursor q = range(0, query_count("{dataset}:{profile}"))
      init prebuffer = dataset_prebuffer("{dataset}:{profile}")
      query_vector := query_vector_at_bytes(q, "{dataset}:{profile}")
      ground_truth := neighbor_indices_at(q, "{dataset}:{profile}")
    ops:
      select_ann:
        prepared: "SELECT key FROM {keyspace}.{table} ORDER BY value ANN OF {query_vector} LIMIT {k}"
        relevancy:
          actual: key
          expected: "{ground_truth}"
          k: "{k}"
          functions:
            - recall

  pvs_query:
    summary:
      - recall
    concurrency: "{concurrency}"
    bindings: |
      cursor q = range(0, query_count("{dataset}:{profile}"))
      init prebuffer = dataset_prebuffer("{dataset}:{profile}")
      query_vector := query_vector_at_bytes(q, "{dataset}:{profile}")
      predicate := predicate_value_at(q, "{dataset}:{profile}")
      ground_truth := filtered_neighbor_indices_at(q, "{dataset}:{profile}")
    ops:
      select_ann:
        prepared: "SELECT key FROM {keyspace}.{table} WHERE metadata = {predicate} ORDER BY value ANN OF {query_vector} LIMIT {k}"
        relevancy:
          actual: key
          expected: "{ground_truth}"
          k: "{k}"
          functions:
            - recall
