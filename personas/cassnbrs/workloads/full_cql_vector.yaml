#!/usr/bin/env cassnbrs
# CQL Vector Search — Multi-Profile Discovery
#
# Discovers all profiles matching a prefix, then for each profile
# in order: drops old data, creates schema, loads vectors, waits
# for indexing, and runs ANN search with ground truth validation.
#
# Usage:
#   cassnbrs cql_vector.yaml dataset=sift1m prefix=label_
#   cassnbrs cql_vector.yaml dataset=sift1m prefix=label_ adapter=stdout
#   cassnbrs cql_vector.yaml dataset=sift1m dryrun=phase,gk

params:
  adapter: cql
  dataset: sift1m
  prefix: "label"
  keyspace: baselines
  k_values: "10,100"
  concurrency: "100"
  replication: "{'class': 'SimpleStrategy', 'replication_factor': '1'}"
  fknn_profile: default

summary: "recall; mean(recall) over profile~label"

bindings: |
  inputs := (cycle)

  // Dataset-level constants (from default profile)
  dim := vector_dim("{dataset}")
  profiles := matching_profiles("{dataset}", "{prefix}")
  profile_count := dataset_profile_count("{dataset}")

scenarios:

  fulltest:
    - discover
    - create_keyspace
    - for_each: "profile in matching_profiles('{dataset}', '{prefix}')"
      phases:
        - drop_table
        - create_table
        - create_index
        - rampup
        - for_each: "k in {k_values}"
          phases:
            - search_pre_build
        - build_index
        - for_each: "k in {k_values}"
          phases:
            - search_post_build
    - for_each: "profile in matching_profiles('{dataset}', 'default')"
      phases:
        - fknn_drop_table
        - fknn_create_table
        - fknn_create_vector_index
        - fknn_create_metadata_index
        - fknn_rampup
        - for_each: "k in {k_values}"
          phases:
            - fknn_search

  fknn_rampup:
    - for_each: "profile in matching_profiles('{dataset}', 'default')"
      phases:
        - fknn_drop_table
        - fknn_create_table
        - fknn_create_vector_index
        - fknn_create_metadata_index
        - fknn_rampup

  reportonly:
#    - discover
#    - create_keyspace
    - for_each: "profile in matching_profiles('{dataset}', 'label')"
      phases:
#        - drop_table
#        - create_table
#        - create_index
#        - rampup
#        - for_each: "k in {k_values}"
#          phases:
#            - search_pre_build
#        - build_index
        - for_each: "k in {k_values}"
          phases:
            - search_post_build
    - for_each: "k in {k_values}"
      phases:
        - fknn_search_post_build

  search:
    - for_each: "profile in matching_profiles('{dataset}', '{prefix}')"
      phases:
        - for_each: "k in {k_values}"
          phases:
            - search_post_build

  # Full filtered-KNN test against the default profile.
  # The default profile has all facets: base, query, neighbor_indices,
  # metadata, predicates, results, and filtered_knn.
  # Inserts metadata per row, queries with WHERE predicate, and
  # computes recall against filtered ground truth.
  # Usage: cassnbrs cql_vector.yaml filtered_knn dataset=sift1m
  # Smoke test: filtered KNN with minimal cycles.
  # Usage: cassnbrs cql_vector.yaml filtered_knn_smoke dataset=sift1m
  filtered_knn_smoke:
    - create_keyspace
    - for_each: "profile in matching_profiles('{dataset}', 'default')"
      phases:
        - fknn_drop_table
        - fknn_create_table
        - fknn_create_vector_index
        - fknn_create_metadata_index
        - fknn_rampup_smoke
        - for_each: "k in {k_values}"
          phases:
            - fknn_search_smoke

  filtered_knn:
    - create_keyspace
    - for_each: "profile in matching_profiles('{dataset}', 'default')"
      phases:
        - fknn_drop_table
        - fknn_create_table
        - fknn_create_vector_index
        - fknn_create_metadata_index
        - fknn_rampup
        - for_each: "k in {k_values}"
          phases:
            - fknn_search
#        - fknn_build_index
#        - for_each: "k in {k_values}"
#          phases:
#            - fknn_search_post_build

phases:
  discover:
    adapter: stdout
    cycles: ===auto
    concurrency: 1
    ops:
      info:
        stmt: "=== {dataset}: matching profiles for prefix '{prefix}': {profiles} ==="

  create_keyspace:
    cycles: ===auto
    concurrency: 1
    ops:
      ks:
        raw: "CREATE KEYSPACE IF NOT EXISTS {keyspace} WITH replication = {replication} AND durable_writes = true"

  drop_table:
    cycles: ===auto
    concurrency: 1
    ops:
      drop:
        raw: "DROP TABLE IF EXISTS {keyspace}.vec_{profile}"

  create_table:
    cycles: ===auto
    concurrency: 1
    bindings: |
      dim := vector_dim("{dataset}:{profile}")
    ops:
      create_table:
        raw: "CREATE TABLE IF NOT EXISTS {keyspace}.vec_{profile} (key text PRIMARY KEY, value vector<float, {dim}>)"

  create_index:
    cycles: ===auto
    concurrency: 1
    ops:
      create_index:
        raw: "CREATE CUSTOM INDEX IF NOT EXISTS vec_{profile}_idx ON {keyspace}.vec_{profile} (value) USING 'StorageAttachedIndex'"

  rampup:
    summary: true
    cycles: "{vector_count('{dataset}:{profile}')}"
    concurrency: "{concurrency}"
    bindings: |
      init prebuffer = dataset_prebuffer("{dataset}:{profile}")
      id := format_u64(cycle, 10)
      train_vector := vector_at(cycle, "{dataset}:{profile}")
    ops:
      insert:
        batch: 8
        batchtype: unlogged
        prepared: "INSERT INTO {keyspace}.vec_{profile} (key, value) VALUES ('{id}', {train_vector})"

  search_pre_build:
    summary:
      - recall
    cycles: "{query_count('{dataset}:{profile}')}"
    concurrency: "{concurrency}"
    bindings: |
      init prebuffer = dataset_prebuffer("{dataset}:{profile}")
      query_vector := query_vector_at(cycle, "{dataset}:{profile}")
      ground_truth := neighbor_indices_at(cycle, "{dataset}:{profile}")
    ops:
      select_ann:
        prepared: "SELECT key FROM {keyspace}.vec_{profile} ORDER BY value ANN OF {query_vector} LIMIT {k}"
        relevancy:
          actual: key
          expected: "{ground_truth}"
          k: "{k}"
          functions:
            - recall
#            - precision

  build_index:
    summary: true
    cycles: ===auto
    concurrency: 1
    ops:
      wait_for_index:
        raw: "SELECT index_name, is_building FROM system_views.sai_column_indexes WHERE keyspace_name = '{keyspace}' AND index_name = 'vec_{profile}_idx' AND is_building = true ALLOW FILTERING"
        poll: await_empty
        poll_interval_ms: 5000
        timeout_ms: 600000
        poll_metric_name: index_build_time_s

  search_post_build:
    summary:
      - recall
    cycles: "{query_count('{dataset}:{profile}')}"
    concurrency: "{concurrency}"
    bindings: |
      init prebuffer = dataset_prebuffer("{dataset}:{profile}")
      query_vector := query_vector_at(cycle, "{dataset}:{profile}")
      ground_truth := neighbor_indices_at(cycle, "{dataset}:{profile}")
    ops:
      select_ann:
        prepared: "SELECT key FROM {keyspace}.vec_{profile} ORDER BY value ANN OF {query_vector} LIMIT {k}"
        relevancy:
          actual: key
          expected: "{ground_truth}"
          k: "{k}"
          functions:
            - recall
#            - precision

  # ── Filtered KNN smoke phases ─────────────────────────────────

  fknn_rampup_smoke:
    cycles: 100
    concurrency: 1
    bindings: |
      init prebuffer = dataset_prebuffer("{dataset}:{fknn_profile}")
      id := format_u64(cycle, 10)
      train_vector := vector_at(cycle, "{dataset}:{fknn_profile}")
      meta := metadata_value_at(cycle, "{dataset}:{fknn_profile}")
    ops:
      insert:
        batch: 8
        batchtype: unlogged
        prepared: "INSERT INTO {keyspace}.fknn_{fknn_profile} (key, value, metadata) VALUES ('{id}', {train_vector}, {meta})"

  fknn_search_smoke:
    cycles: 10
    concurrency: 1
    bindings: |
      init prebuffer = dataset_prebuffer("{dataset}:{fknn_profile}")
      query_vector := query_vector_at(cycle, "{dataset}:{fknn_profile}")
      predicate := predicate_value_at(cycle, "{dataset}:{fknn_profile}")
      ground_truth := filtered_neighbor_indices_at(cycle, "{dataset}:{fknn_profile}")
    ops:
      select_ann:
        prepared: "SELECT key FROM {keyspace}.fknn_{fknn_profile} WHERE metadata = {predicate} ORDER BY value ANN OF {query_vector} LIMIT {k}"
        relevancy:
          actual: key
          expected: "{ground_truth}"
          k: "{k}"
          functions:
            - recall

  # ── Filtered KNN phases ──────────────────────────────────────

  fknn_drop_table:
    cycles: ===auto
    concurrency: 1
    ops:
      drop:
        raw: "DROP TABLE IF EXISTS {keyspace}.fknn_{fknn_profile}"

  fknn_create_table:
    cycles: ===auto
    concurrency: 1
    bindings: |
      dim := vector_dim("{dataset}:{profile}")
    ops:
      create_table:
        raw: "CREATE TABLE IF NOT EXISTS {keyspace}.fknn_{fknn_profile} (key text PRIMARY KEY, value vector<float, {dim}>, metadata int)"

  fknn_create_vector_index:
    cycles: ===auto
    concurrency: 1
    ops:
      create_index:
        raw: "CREATE CUSTOM INDEX IF NOT EXISTS fknn_{fknn_profile}_vec_idx ON {keyspace}.fknn_{fknn_profile} (value) USING 'StorageAttachedIndex'"

  fknn_create_metadata_index:
    cycles: ===auto
    concurrency: 1
    ops:
      create_index:
        raw: "CREATE CUSTOM INDEX IF NOT EXISTS fknn_{fknn_profile}_meta_idx ON {keyspace}.fknn_{fknn_profile} (metadata) USING 'StorageAttachedIndex'"

  fknn_rampup:
    summary: true
    cycles: "{vector_count('{dataset}:{fknn_profile}')}"
    concurrency: "{concurrency}"
    bindings: |
      init prebuffer = dataset_prebuffer("{dataset}:{fknn_profile}")
      id := format_u64(cycle, 10)
      train_vector := vector_at(cycle, "{dataset}:{fknn_profile}")
      meta := metadata_value_at(cycle, "{dataset}:{fknn_profile}")
    ops:
      insert:
        batch: 8
        batchtype: unlogged
        prepared: "INSERT INTO {keyspace}.fknn_{fknn_profile} (key, value, metadata) VALUES ('{id}', {train_vector}, {meta})"

  fknn_search:
    summary:
      - recall
    cycles: "{query_count('{dataset}:{fknn_profile}')}"
    concurrency: "{concurrency}"
    bindings: |
      init prebuffer = dataset_prebuffer("{dataset}:{fknn_profile}")
      query_vector := query_vector_at(cycle, "{dataset}:{fknn_profile}")
      predicate := predicate_value_at(cycle, "{dataset}:{fknn_profile}")
      ground_truth := filtered_neighbor_indices_at(cycle, "{dataset}:{fknn_profile}")
    ops:
      select_ann:
        prepared: "SELECT key FROM {keyspace}.fknn_{fknn_profile} WHERE metadata = {predicate} ORDER BY value ANN OF {query_vector} LIMIT {k}"
        relevancy:
          actual: key
          expected: "{ground_truth}"
          k: "{k}"
          functions:
            - recall
#            - precision

  fknn_build_index:
    summary: true
    cycles: ===auto
    concurrency: 1
    ops:
      wait_for_index:
        raw: "SELECT index_name, is_building FROM system_views.sai_column_indexes WHERE keyspace_name = '{keyspace}' AND index_name = 'fknn_{fknn_profile}_vec_idx' AND is_building = true ALLOW FILTERING"
        poll: await_empty
        poll_interval_ms: 5000
        timeout_ms: 600000
        poll_metric_name: index_build_time_s

  fknn_search_post_build:
    summary:
      - recall
    cycles: "{query_count('{dataset}:{fknn_profile}')}"
    concurrency: "{concurrency}"
    bindings: |
      init prebuffer = dataset_prebuffer("{dataset}:{fknn_profile}")
      query_vector := query_vector_at(cycle, "{dataset}:{fknn_profile}")
      predicate := predicate_value_at(cycle, "{dataset}:{fknn_profile}")
      ground_truth := filtered_neighbor_indices_at(cycle, "{dataset}:{fknn_profile}")
    ops:
      select_ann:
        prepared: "SELECT key FROM {keyspace}.fknn_{fknn_profile} WHERE metadata = {predicate} ORDER BY value ANN OF {query_vector} LIMIT {k}"
        relevancy:
          actual: key
          expected: "{ground_truth}"
          k: "{k}"
          functions:
            - recall
#            - precision
