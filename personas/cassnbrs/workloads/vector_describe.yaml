# vector_describe.yaml — Describe everything knowable about a
# vector dataset and each of its profiles.
#
# Walks the vectordata catalog for `{dataset}` and prints every
# metadata field the vectordata GK nodes expose:
#   - dataset-level: profile count, profile list
#   - per-profile:   dimensionality, distance function, base/query
#                    /neighbor cardinalities, facets, metadata
#                    index count
#   - per-profile samples: first base vector, the query at {qi},
#                    its ground-truth neighbor indices/distances,
#                    and (if applicable) the metadata-matching
#                    base ordinals for that query
#
# This replaces the earlier three split workloads (describe,
# inspect, walk) — one consolidated walk over the catalog that
# covers every field each of them touched.
#
# Usage:
#   nbrs run workload=workloads/vector_describe.yaml
#   nbrs run workload=workloads/vector_describe.yaml dataset=glove-25
#   nbrs run workload=workloads/vector_describe.yaml dataset=example prefix=label_
#   nbrs run workload=workloads/vector_describe.yaml dataset=example qi=42

params:
  adapter: stdout
  dataset: example
  # Profile-name prefix filter. Empty string matches every
  # profile. Non-empty restricts the walk to profiles whose
  # name starts with this prefix (useful for per-partition
  # datasets like `label_00`, `label_01`, …).
  prefix: ""
  # Query index used for the "samples & ground-truth" phase.
  # Must be < query_count(dataset:profile) for every profile
  # the walk visits.
  qi: "0"

bindings: |
  profile_count := dataset_profile_count("{dataset}")
  profile_names := matching_profiles("{dataset}", "{prefix}")

scenarios:
  default:
    - dataset_overview
    - for_each: "profile in matching_profiles('{dataset}', '{prefix}')"
      phases:
        - profile_header
        - profile_stats
        - profile_samples
        - metadata_walk

phases:

  # ── Dataset-level facts (run once) ──────────────────────────────
  dataset_overview:
    cycles: 1
    concurrency: 1
    ops:
      banner:
        stmt: "=== dataset: {dataset} ==="
      profile_count:
        stmt: "  profiles ({prefix}*): {profile_count} total, {profile_names}"

  # ── Per-profile header (one cycle per profile iteration) ────────
  profile_header:
    cycles: 1
    concurrency: 1
    ops:
      banner:
        stmt: "--- profile: {dataset}:{profile} ---"

  # ── Per-profile scalar stats ────────────────────────────────────
  profile_stats:
    cycles: 1
    concurrency: 1
    bindings: |
      dim          := vector_dim("{dataset}:{profile}")
      base_count   := vector_count("{dataset}:{profile}")
      query_count  := query_count("{dataset}:{profile}")
      neighbor_k   := neighbor_count("{dataset}:{profile}")
      dist_fn      := dataset_distance_function("{dataset}:{profile}")
      facets       := dataset_facets("{dataset}:{profile}")
      mi_count     := metadata_indices_count("{dataset}:{profile}")
    ops:
      dimensions:
        stmt: "  dimensions:           {dim}"
      distance:
        stmt: "  distance function:    {dist_fn}"
      base_card:
        stmt: "  base vectors:         {base_count}"
      query_card:
        stmt: "  query vectors:        {query_count}"
      neighbor_card:
        stmt: "  neighbors (max k):    {neighbor_k}"
      facets:
        stmt: "  facets available:     {facets}"
      mi_count:
        stmt: "  metadata index sets:  {mi_count}"

  # ── Sample values (ground truth for query {qi}) ─────────────────
  # Shows one example from each retrievable list facet — the
  # first base vector, the query at {qi}, and its neighbor
  # indices/distances. Profiles that don't carry a given facet
  # (e.g. ANN-only profiles with no metadata) surface the catalog's
  # null/empty rendering for those lines.
  profile_samples:
    cycles: 1
    concurrency: 1
    bindings: |
      base_vec     := vector_at(0, "{dataset}:{profile}")
      query_vec    := query_vector_at({qi}, "{dataset}:{profile}")
      gt_indices   := neighbor_indices_at({qi}, "{dataset}:{profile}")
      gt_distances := neighbor_distances_at({qi}, "{dataset}:{profile}")
    ops:
      base_sample:
        stmt: "  base[0]:              {base_vec}"
      query_sample:
        stmt: "  query[{qi}]:             {query_vec}"
      gt_indices:
        stmt: "  neighbors@q[{qi}]:       {gt_indices}"
      gt_distances:
        stmt: "  distances@q[{qi}]:       {gt_distances}"

  # ── Metadata-index walk for query {qi} ──────────────────────────
  # Filtered-KNN / PVS datasets expose, for each query, the set of
  # base ordinals that match its predicate. This phase enumerates
  # that set for query `{qi}`. Profiles without metadata indices
  # have `mi_len == 0` and the phase runs zero cycles (silent).
  metadata_walk:
    cycles: "{mi_len}"
    concurrency: 1
    bindings: |
      mi_len       := metadata_indices_len_at({qi}, "{dataset}:{profile}")
      mi           := metadata_indices_at({qi}, "{dataset}:{profile}")
      base_ordinal := array_at(mi, cycle)
    ops:
      match:
        stmt: "  metadata match[{cycle}] @ q[{qi}]: base[{base_ordinal}]"
