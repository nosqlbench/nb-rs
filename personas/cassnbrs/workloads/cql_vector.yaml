#!/usr/bin/env cassnbrs
# CQL Vector Search — Multi-Profile Discovery
#
# Discovers all profiles matching a prefix, then for each profile:
# creates a table, loads vectors, and runs ANN search with filtered
# ground truth. Each profile gets its own table and index namespace.
#
# The for_each: directive iterates profiles dynamically. Each
# iteration has its own GK scope with profile-specific constants
# (dimension, vector count, ground truth).
#
# Usage:
#   cassnbrs cql_vector.yaml dataset=sift1m prefix=label
#   cassnbrs cql_vector.yaml dataset=sift1m prefix=label adapter=stdout
#   cassnbrs cql_vector.yaml schema adapter=stdout   # just show DDL

params:
  adapter: cassandra
  dataset: sift1m
  prefix: ""
  keyspace: baselines
  k: "100"
  concurrency: "100"
  replication: "{'class': 'SimpleStrategy', 'replication_factor': '1'}"

bindings: |
  inputs := (cycle)

  // Dataset-level constants (from default profile)
  dim := vector_dim("{dataset}")
  profiles := matching_profiles("{dataset}", "{prefix}")
  profile_count := dataset_profile_count("{dataset}")

scenarios:
  default:
    - discover
    - schema
    - rampup
    - search

phases:
  discover:
    cycles: 1
    concurrency: 1
    ops:
      info:
        stmt: "=== {dataset}: matching profiles for prefix '{prefix}': {profiles} ==="

  schema:
    for_each: "pname in matching_profiles('{dataset}', '{prefix}')"
    cycles: 1
    concurrency: 1
    ops:
      create_keyspace:
        raw: "CREATE KEYSPACE IF NOT EXISTS {keyspace} WITH replication = {replication} AND durable_writes = true"
      create_table:
        raw: "CREATE TABLE IF NOT EXISTS {keyspace}.vec_{pname} (key text PRIMARY KEY, value vector<float, {dim}>)"
      create_index:
        raw: "CREATE CUSTOM INDEX IF NOT EXISTS vec_{pname}_idx ON {keyspace}.vec_{pname} (value) USING 'StorageAttachedIndex'"

  rampup:
    for_each: "pname in matching_profiles('{dataset}', '{prefix}')"
    cycles: "{vector_count('{dataset}:{pname}')}"
    concurrency: "{concurrency}"
    ops:
      insert:
        prepared: "INSERT INTO {keyspace}.vec_{pname} (key, value) VALUES ('{format_u64(cycle, 10)}', {vector_at(cycle, '{dataset}:{pname}')})"

  search:
    for_each: "pname in matching_profiles('{dataset}', '{prefix}')"
    cycles: 100
    concurrency: "{concurrency}"
    ops:
      select_ann:
        prepared: "SELECT key FROM {keyspace}.vec_{pname} ORDER BY value ANN OF {query_vector_at(cycle, '{dataset}:{pname}')} LIMIT {k}"
        relevancy:
          actual: key
          expected: "{filtered_neighbor_indices_at(cycle, '{dataset}:{pname}')}"
          k: 100
          functions:
            - recall
            - precision
