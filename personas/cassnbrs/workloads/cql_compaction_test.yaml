#!/usr/bin/env cassnbrs
# CQL Compaction Task Visibility Test
#
# Demonstrates that system_views.sstable_tasks shows active SAI
# compaction tasks during index building, and that the poll wrapper
# correctly waits for them to complete.
#
# This workload:
# 1. Drops and recreates a table with a SAI vector index
# 2. Loads enough data to trigger compaction
# 3. Polls system_views.sstable_tasks and reports task counts
# 4. Verifies the poll completes (tasks reach zero)
#
# Usage:
#   cassnbrs workload=cql_compaction_test.yaml
#   cassnbrs workload=cql_compaction_test.yaml dataset=sift1m profile=label_01

params:
  adapter: cql
  dataset: sift1m
  profile: default
  keyspace: baselines
  table: compaction_test
  concurrency: "100"
  replication: "{'class': 'SimpleStrategy', 'replication_factor': '1'}"

bindings: |
  dim := vector_dim("{dataset}:{profile}")

scenarios:
  default:
    - setup
    - ddl
    - rampup
    - create_index_on_existing_data
    - probe_sai
    - await_tasks
    - verify

phases:
  setup:
    cycles: ===auto
    concurrency: 1
    adapter: stdout
    ops:
      info:
        stmt: "=== Compaction Test: {dataset}:{profile} dim={dim} ==="

  ddl:
    cycles: ===auto
    concurrency: 1
    ops:
      create_ks:
        raw: "CREATE KEYSPACE IF NOT EXISTS {keyspace} WITH replication = {replication}"
      drop_table:
        raw: "DROP TABLE IF EXISTS {keyspace}.{table}"
      create_table:
        raw: "CREATE TABLE IF NOT EXISTS {keyspace}.{table} (key text PRIMARY KEY, value vector<float, {dim}>)"

  # Create SAI index AFTER data is loaded — triggers INDEX_BUILD task
  # that appears in system_views.sstable_tasks. This is the scenario
  # where task tracking is essential.
  create_index_on_existing_data:
    cycles: ===auto
    concurrency: 1
    ops:
      idx:
        raw: "CREATE CUSTOM INDEX IF NOT EXISTS {table}_idx ON {keyspace}.{table} (value) USING 'StorageAttachedIndex'"

  rampup:
    cycles: "{vector_count('{dataset}:{profile}')}"
    concurrency: "{concurrency}"
    bindings: |
      init prebuffer = dataset_prebuffer("{dataset}:{profile}")
      id := format_u64(cycle, 10)
      train_vector := vector_at(cycle, "{dataset}:{profile}")
    ops:
      insert:
        prepared: "INSERT INTO {keyspace}.{table} (key, value) VALUES ('{id}', {train_vector})"

  # Probe for active SAI index building immediately after rampup.
  # Uses sai_column_indexes.is_building to check if the index is
  # still being built. Any row with is_building=true means the
  # index is not yet ready for queries.
  # Probe sai_column_indexes.is_building at 10Hz immediately after
  # CREATE INDEX. This is the definitive check for SAI build completion.
  # CREATE INDEX on a populated table sets is_building=true and it
  # stays true until all SSTables are indexed.
  probe_sai:
    cycles: 100
    concurrency: 1
    ops:
      probe:
        raw: "SELECT index_name, is_building, is_queryable FROM system_views.sai_column_indexes WHERE keyspace_name = '{keyspace}' AND index_name = '{table}_idx'"
        emit: true

  # Wait for the SAI index build to complete by polling is_building.
  # Also waits for any sstable tasks to settle.
  await_tasks:
    cycles: ===auto
    concurrency: 1
    ops:
      wait:
        raw: "SELECT keyspace_name, table_name, kind, progress FROM system_views.sstable_tasks WHERE keyspace_name = '{keyspace}' AND table_name = '{table}'"
        poll: await_empty
        poll_interval_ms: 1000
        timeout_ms: 600000
        poll_metric_name: index_build_time_s

  # Verify the index works with a query
  verify:
    cycles: 10
    concurrency: 1
    bindings: |
      init prebuffer = dataset_prebuffer("{dataset}:{profile}")
      query_vector := query_vector_at(cycle, "{dataset}:{profile}")
    ops:
      query:
        prepared: "SELECT key FROM {keyspace}.{table} ORDER BY value ANN OF {query_vector} LIMIT 10"
